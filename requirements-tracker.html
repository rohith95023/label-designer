<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requirements Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:32px 40px;border-bottom:1px solid #475569}
.header h1{font-size:28px;font-weight:700;color:#f8fafc;margin-bottom:8px}
.header p{color:#94a3b8;font-size:14px}
.stats{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,.05);border:1px solid #475569;border-radius:12px;padding:16px 24px;min-width:140px}
.stat-card .num{font-size:28px;font-weight:700}
.stat-card .label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.stat-total .num{color:#60a5fa}
.stat-done .num{color:#34d399}
.stat-pending .num{color:#f59e0b}
.stat-pct .num{color:#a78bfa}
.progress-bar{margin-top:20px;background:#1e293b;border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#34d399,#60a5fa);transition:width .4s ease}
.controls{padding:20px 40px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.controls input{background:#1e293b;border:1px solid #475569;border-radius:8px;padding:10px 16px;color:#e2e8f0;font-size:14px;width:320px;outline:none;transition:border-color .2s}
.controls input:focus{border-color:#60a5fa}
.controls select{background:#1e293b;border:1px solid #475569;border-radius:8px;padding:10px 16px;color:#e2e8f0;font-size:14px;outline:none;cursor:pointer}
.filter-btn{padding:8px 16px;border-radius:8px;border:1px solid #475569;background:transparent;color:#94a3b8;font-size:13px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#60a5fa;color:#0f172a;border-color:#60a5fa}
.table-wrap{padding:0 40px 40px}
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{background:#1e293b;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.8px;padding:14px 16px;text-align:left;position:sticky;top:0;z-index:10;border-bottom:2px solid #334155}
thead th:first-child{border-radius:8px 0 0 0}
thead th:last-child{border-radius:0 8px 0 0}
tbody tr{border-bottom:1px solid #1e293b;transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:16px;font-size:14px;line-height:1.6;vertical-align:top}
td.id-col{color:#64748b;font-size:12px;font-weight:700;white-space:nowrap;width:50px;text-align:center}
td.category-col{width:170px;vertical-align:top}
.cat-badge{display:inline-block;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px}
.cat-user{background:rgba(96,165,250,.15);color:#60a5fa}
.cat-lang{background:rgba(45,212,191,.15);color:#2dd4bf}
.cat-stock{background:rgba(52,211,153,.15);color:#34d399}
.cat-object{background:rgba(74,222,128,.15);color:#4ade80}
.cat-placeholder{background:rgba(163,230,53,.15);color:#a3e635}
.cat-phrase{background:rgba(250,204,21,.15);color:#facc15}
.cat-approval{background:rgba(248,113,113,.15);color:#f87171}
.cat-designer{background:rgba(167,139,250,.15);color:#a78bfa}
.cat-request{background:rgba(236,72,153,.15);color:#ec4899}
.cat-workflow{background:rgba(251,146,60,.15);color:#fb923c}
.cat-protocol{background:rgba(129,140,248,.15);color:#818cf8}
.cat-biostat{background:rgba(56,189,248,.15);color:#38bdf8}
.cat-print{background:rgba(244,114,182,.15);color:#f472b6}
.cat-compliance{background:rgba(253,224,71,.15);color:#fde047}
td.desc-col{max-width:600px}
.user-story{display:flex;flex-direction:column;gap:6px}
.user-story .persona{font-weight:700;color:#f8fafc;font-size:13px}
.user-story .persona span{color:#60a5fa;font-weight:600}
.user-story .want{color:#cbd5e1;font-size:13px}
.user-story .want strong{color:#34d399}
.user-story .benefit{color:#94a3b8;font-size:12px;font-style:italic}
.user-story .benefit strong{color:#a78bfa;font-weight:600;font-style:normal}
td.status-col{width:150px;text-align:center;vertical-align:middle}
.status-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid #475569;background:#1e293b;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
.status-btn:hover{border-color:#60a5fa;transform:scale(1.02)}
.status-btn.done{background:rgba(52,211,153,.12);border-color:#34d399;color:#34d399}
.status-btn.not-done{background:rgba(248,113,113,.08);border-color:#64748b;color:#94a3b8}
.status-btn .icon{font-size:15px;font-weight:700}
.reset-btn{margin-left:auto;padding:8px 20px;border-radius:8px;border:1px solid #475569;background:transparent;color:#f87171;font-size:13px;cursor:pointer;transition:all .2s}
.reset-btn:hover{background:#f87171;color:#0f172a;border-color:#f87171}
.empty-msg{text-align:center;padding:60px;color:#64748b;font-size:16px}
.mark-all{padding:8px 16px;border-radius:8px;border:1px solid #475569;background:transparent;color:#34d399;font-size:13px;cursor:pointer;transition:all .2s}
.mark-all:hover{background:#34d399;color:#0f172a;border-color:#34d399}
@media(max-width:1100px){.header,.controls,.table-wrap{padding-left:16px;padding-right:16px}.controls input{width:100%}td.desc-col{max-width:300px}}

/* Acceptance Criteria Panel */
.ac-panel{display:none}
.ac-panel.open{display:table-row;animation:fadeIn .25s ease-out}
.ac-panel td{background:#111827;padding:20px 24px 24px 66px;border-bottom:1px solid #334155}
.ac-container{max-width:100%}
.ac-title{color:#60a5fa;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ac-title::before{content:"";display:inline-block;width:3px;height:14px;background:#60a5fa;border-radius:2px}
.ac-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ac-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;transition:border-color .2s,background .2s}
.ac-card:hover{border-color:#60a5fa;background:#1a2536}
.ac-num{flex-shrink:0;width:32px;height:32px;background:linear-gradient(135deg,rgba(96,165,250,.2),rgba(96,165,250,.08));color:#60a5fa;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:1px solid rgba(96,165,250,.15)}
.ac-text{color:#cbd5e1;font-size:13px;line-height:1.6;flex:1}
.ac-toggle{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:rgba(96,165,250,.1);color:#60a5fa;font-size:11px;cursor:pointer;margin-right:10px;flex-shrink:0;transition:all .2s;border:none;padding:0}
.ac-toggle:hover{background:rgba(96,165,250,.25)}
.ac-toggle.expanded{transform:rotate(90deg)}
.desc-col{cursor:pointer}
.desc-col:hover{background:rgba(255,255,255,.02)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.ac-grid{grid-template-columns:1fr}}

</style>
</head>
<body>
<div class="header">
<h1>Requirements Tracker</h1>
<p>Clinical Label Management System &mdash; User Story Completion Tracker</p>
<div class="stats" id="stats"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div class="controls">
<input type="text" id="search" placeholder="Search by persona, requirement, or category...">
<select id="catFilter"><option value="all">All Categories</option></select>
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="completed">Completed</button>
<button class="filter-btn" data-filter="pending">Pending</button>
<button class="mark-all" onclick="markAll()">Mark All Done</button>
<button class="reset-btn" onclick="resetAll()">Reset All</button>
</div>
<div class="table-wrap">
<table>
<thead><tr><th>#</th><th>Category</th><th>Requirement</th><th>Status</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
const data=[
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Create and manage system users with internal and external classifications",benefit:"Control access based on user type and maintain proper security segregation between different user categories",ac:["System administrator can create a new user account by providing required information including username, email address, full name, and contact details.", "System administrator must select a user classification as either 'Internal' or 'External' during user creation, with this field being mandatory.", "Internal users are designated for employees and staff members who have full access to internal system features and modules.", "External users are designated for contractors, partners, vendors, or clients who have restricted access to specific system features based on their role.", "System validates that username is unique across all users and displays an error message if a duplicate username is attempted.", "System validates that email address is unique across all users and displays an error message if a duplicate email is attempted.", "System validates email address format and displays an error message if the format is invalid.", "System administrator can edit existing user information including full name, email address, contact details, and user classification after creation.", "System administrator can change a user's classification from Internal to External or vice versa, with appropriate warnings about access level changes.", "System administrator can view a list of all users with filtering options to display only Internal users, only External users, or all users."]},
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Assign users to specific modules and transaction-level events",benefit:"Control granular access permissions and ensure users only have access to functionality they need for their job responsibilities",ac:["The system must provide an interface to select a user and view all available modules that can be assigned to that user.", "The administrator must be able to assign one or multiple modules to a selected user through checkboxes, dropdown menus, or a similar selection mechanism.", "The system must display all transaction-level events associated with each module when a module is selected or expanded.", "The administrator must be able to assign specific transaction-level events to a user independently from module assignment, allowing granular control over user permissions.", "The system must support bulk assignment of multiple transaction-level events to a user simultaneously to improve efficiency when configuring access.", "When a module is assigned to a user, the system must provide an option to automatically assign all associated transaction-level events or allow selective assignment.", "The system must prevent assignment of transaction-level events to a user if the parent module is not assigned, displaying a clear validation error message.", "The administrator must be able to remove previously assigned modules from a user, and the system must automatically revoke all associated transaction-level event permissions.", "The administrator must be able to remove specific transaction-level events from a user while maintaining the parent module assignment.", "The system must display a clear visual indication showing which modules and transaction-level events are currently assigned to the selected user."]},
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Configure event-based permissions for Create, Complete, and Approve actions",benefit:"Control which users or roles can perform specific actions on different event types within the system",ac:["System administrators can access a permissions configuration interface specifically for event-based actions including Create, Complete, and Approve operations.", "Administrators can define permissions at a granular level by associating specific user roles with individual event types for Create action capability.", "Administrators can define permissions at a granular level by associating specific user roles with individual event types for Complete action capability.", "Administrators can define permissions at a granular level by associating specific user roles with individual event types for Approve action capability.", "The system displays a clear matrix or grid view showing all event types and their associated Create, Complete, and Approve permissions by role.", "Administrators can assign multiple roles to have the same permission for a single event type and action combination without conflicts.", "When a permission is configured, the system immediately validates that at least one role has Create permission for each active event type to prevent orphaned events.", "The system prevents users without Create permission from accessing the create functionality for restricted event types, displaying an appropriate access denied message.", "The system prevents users without Complete permission from marking events as complete for restricted event types, showing a clear permission error notification.", "The system prevents users without Approve permission from approving events for restricted event types, with explicit feedback about missing authorization."]},
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Configure whether the same user can complete and approve a transaction or enforce different users for these actions",benefit:"Implement segregation of duties policies that align with compliance and risk management requirements",ac:["The system must provide a configuration setting that allows administrators to enable or disable segregation of duties enforcement for completion and approval actions.", "When segregation of duties is enabled, the system must prevent the same user who completed a transaction from also approving that transaction.", "When segregation of duties is disabled, the system must allow the same user to both complete and approve a transaction without restrictions.", "The configuration setting must be accessible only to users with system administrator or equivalent privileged access roles.", "The system must display a clear error message to users attempting to approve a transaction they completed when segregation of duties is enabled, explaining that a different user must perform the approval.", "The configuration change must take effect immediately for all new transactions without requiring a system restart or user re-login.", "The system must maintain an audit log entry whenever the segregation of duties configuration setting is changed, recording the administrator who made the change, timestamp, and the new setting value.", "When segregation of duties is enabled, the approval interface must not display transactions for approval to the user who originally completed them, filtering them out from the available approval queue.", "The system must allow configuration at a global level that applies to all workflows and transaction types by default.", "The configuration interface must clearly indicate the current state of segregation of duties enforcement with an easily visible toggle or checkbox control."]},
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Implement role-based access control with event-level authorization",benefit:"Users can only access and perform actions on events and features appropriate for their assigned roles, ensuring security and data governance",ac:["The system must support multiple predefined roles such as Admin, Manager, User, and Viewer with distinct permission levels for event access and actions.", "Each role must have a clearly defined set of permissions that determine which events they can view, create, edit, delete, or manage.", "Users assigned to the Admin role must have full access to all events and administrative functions including user management and system configuration.", "Users assigned to the Manager role must have access to create, view, edit, and delete events within their assigned scope or department but cannot modify system-wide settings.", "Users assigned to the User role must be able to create and view their own events and view events shared with them, but cannot delete or modify events created by others.", "Users assigned to the Viewer role must only be able to view events they have been granted access to, with no ability to create, edit, or delete any events.", "The system must enforce event-level authorization checks before allowing any user to perform create, read, update, or delete operations on specific events.", "When a user attempts to access an event they are not authorized to view, the system must deny access and display an appropriate error message indicating insufficient permissions.", "When a user attempts to modify or delete an event they are not authorized to change, the system must prevent the action and return a clear authorization failure message.", "The system must validate user permissions in real-time at the API level before processing any event-related request to prevent unauthorized access through direct API calls."]},
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Enforce electronic signature requirements for critical actions within the RBAC system",benefit:"All sensitive operations are properly authenticated and auditable for compliance and security purposes",ac:["System identifies and categorizes critical actions that require electronic signature authentication, including user role modifications, permission grants, access revocations, and security policy changes.", "When a user with appropriate permissions attempts to perform a critical action, the system prompts them to provide an electronic signature before the action can be completed.", "Electronic signature prompt displays clear information about the specific action being performed, including action type, affected user or resource, timestamp, and reason field for justification.", "User must enter their current password or PIN as part of the electronic signature authentication process to verify their identity before proceeding with the critical action.", "System validates the electronic signature credentials in real-time and prevents the critical action from executing if authentication fails, displaying an appropriate error message.", "After three consecutive failed electronic signature authentication attempts, the system temporarily locks the user from performing critical actions for a defined period and notifies administrators.", "Successfully authenticated electronic signatures are recorded in an immutable audit log with user identity, timestamp, action performed, IP address, and any justification provided.", "System allows administrators to configure which specific actions require electronic signatures through a centralized configuration interface within the RBAC settings.", "Electronic signature requirements respect role hierarchy, ensuring that users cannot bypass signature requirements even when performing actions on accounts with lower privilege levels.", "When electronic signature is required but the user session is approaching timeout, the system extends the session temporarily to allow completion of the signature process without interruption."]},
{cat:"User Management",cls:"cat-user",persona:"System Administrator",want:"Automatically log all user actions in a complete audit trail compliant with 21 CFR Part 11 and Annex 11",benefit:"Maintain regulatory compliance and track all system activities for security and quality purposes",ac:["The system must automatically capture and log every user action including login, logout, data entry, data modification, data deletion, configuration changes, and access attempts without requiring manual intervention.", "Each audit trail entry must include the user's unique identifier or username who performed the action to ensure accountability and traceability of all system activities.", "Each audit trail entry must include the exact date and timestamp of when the action occurred with sufficient precision to establish chronological order of events.", "Each audit trail entry must include a clear description of the action performed including the type of operation and the data or system component affected by the action.", "Each audit trail entry must include the before and after values for any data modification or deletion to enable reconstruction of the complete history of changes.", "Each audit trail entry must include the reason for change when applicable, especially for critical data modifications that impact compliance or quality records.", "The audit trail must be stored in a secure, tamper-proof format that prevents unauthorized modification or deletion of audit records by any user including system administrators.", "The system must implement technical controls such as cryptographic hashing or digital signatures to ensure the integrity and authenticity of audit trail records.", "Audit trail records must be retained for the required regulatory period as defined by 21 CFR Part 11 and Annex 11, with minimum retention periods clearly documented.", "The system must prevent any user, including administrators, from editing, deleting, or backdating audit trail entries to maintain the integrity of the compliance record."]},
{cat:"Languages",cls:"cat-lang",persona:"System Administrator",want:"Create and configure base languages with country-specific variants",benefit:"Support localization for different regions and provide users with appropriate language options based on geographic location",ac:["The system must allow creation of base languages (e.g., English, Spanish, French) with a language code, name, and active/inactive status flag.", "The system must support adding country-specific variants for each base language (e.g., English-US, English-UK, English-AU) with distinct locale identifiers.", "Each country-specific variant must include configurable properties such as country code, region name, date format, time format, and currency symbol.", "The system must validate that language codes follow ISO 639-1 standard (two-letter codes) and country codes follow ISO 3166-1 alpha-2 standard.", "The system must prevent creation of duplicate base languages or duplicate country-specific variants within the same base language.", "The system must allow administrators to set a default country variant for each base language that will be used when no specific variant is selected.", "The system must display a hierarchical view showing base languages with their associated country-specific variants in an expandable tree structure.", "The system must allow administrators to activate or deactivate base languages, which should automatically affect the availability of all associated country variants.", "The system must allow administrators to independently activate or deactivate individual country-specific variants without affecting the base language or other variants.", "The system must provide search and filter capabilities to find languages by name, code, country, or active status."]},
{cat:"Languages",cls:"cat-lang",persona:"System Administrator",want:"Specify text orientation as LTR or RTL for each language",benefit:"Application interface displays content in the correct reading direction for users of different languages",ac:["The language configuration interface must include a text orientation field with two selectable options: Left-to-Right (LTR) and Right-to-Left (RTL).", "When adding a new language to the system, the administrator must be able to select either LTR or RTL orientation as a required field before saving.", "When editing an existing language configuration, the administrator must be able to modify the text orientation setting from LTR to RTL or vice versa.", "The text orientation setting must be saved and persisted in the database along with other language configuration properties.", "The system must validate that a text orientation value is selected before allowing the language configuration to be saved.", "If no text orientation is selected when attempting to save, the system must display a validation error message indicating that text orientation is required.", "The language configuration list view must display the current text orientation (LTR or RTL) for each configured language.", "When a user switches to a language configured with RTL orientation, the entire user interface must flip to display content from right to left including navigation menus, forms, and text fields.", "When a user switches to a language configured with LTR orientation, the entire user interface must display content from left to right in the standard format.", "The text orientation setting must apply to all UI components including headers, sidebars, buttons, input fields, tables, and dropdown menus."]},
{cat:"Languages",cls:"cat-lang",persona:"System Administrator",want:"Manage language lifecycle by setting them as Active or Inactive",benefit:"Control which languages are available for use without permanently deleting language configurations",ac:["The system must provide a status field for each language with two possible values: Active and Inactive.", "Only languages with Active status should be available for selection in language-dependent features and dropdowns throughout the application.", "Languages with Inactive status must be hidden from user-facing language selection interfaces but remain in the system database.", "Administrators must be able to change a language status from Active to Inactive through the language configuration interface.", "Administrators must be able to change a language status from Inactive to Active to restore a previously deactivated language.", "When a language is set to Inactive, the system must display a confirmation prompt warning about the impact on users currently using that language.", "The system must prevent setting a language to Inactive if it is currently set as the default system language.", "All existing content and translations associated with an Inactive language must be preserved in the database for potential future reactivation.", "The language list view must display the current status (Active/Inactive) for each language with clear visual indicators such as color coding or status badges.", "Administrators must be able to filter the language list to show only Active languages, only Inactive languages, or all languages."]},
{cat:"Label Stocks",cls:"cat-stock",persona:"Warehouse Manager",want:"Create label stocks with unique identifiers, descriptions, and physical dimensions (length, breadth, height)",benefit:"Maintain accurate inventory of available label materials for product labeling operations",ac:["The system must provide a form to create new label stock records with fields for ID, description, length, breadth, and height.", "The label stock ID field must be mandatory and accept alphanumeric characters with a maximum length of 50 characters.", "The label stock ID must be unique across all label stock records in the system and prevent duplicate entries.", "The description field must be mandatory and accept text input with a maximum length of 255 characters to describe the label stock type or purpose.", "The length field must be mandatory and accept only positive numeric values with up to two decimal places for precision.", "The breadth field must be mandatory and accept only positive numeric values with up to two decimal places for precision.", "The height field must be mandatory and accept only positive numeric values with up to two decimal places for precision.", "The system must display appropriate unit of measurement labels next to dimension fields such as millimeters, centimeters, or inches based on system configuration.", "The system must validate that all mandatory fields are populated before allowing the user to save the label stock record.", "The system must display a clear error message indicating which required fields are missing or invalid when validation fails."]},
{cat:"Label Stocks",cls:"cat-stock",persona:"System Administrator",want:"Enforce validation rules on all label stock data changes and maintain a complete audit trail",benefit:"Data integrity is preserved and all changes are traceable for compliance and troubleshooting purposes",ac:["The system must validate that the label stock name is unique within the organization before allowing creation or update of a label stock record.", "The system must enforce that the label stock code follows the defined format and character restrictions and is unique across all label stocks.", "The system must validate that the quantity on hand cannot be negative and displays an error message when a user attempts to enter a negative value.", "The system must validate that the reorder level is a non-negative number and cannot exceed the maximum stock level if configured.", "The system must validate that the unit of measure is selected from the predefined list and cannot be left blank for active label stocks.", "The system must prevent deletion of label stocks that have associated transaction history and display a meaningful error message explaining the restriction.", "The system must prevent modification of label stock records that are currently in use by active printing jobs and notify the user of the conflict.", "The system must automatically record the username, timestamp, and action type for every create, update, and delete operation on label stock records.", "The system must capture and store the before and after values for all modified fields in the audit trail when a label stock record is updated.", "The system must maintain audit trail entries for a minimum retention period as defined by organizational compliance requirements and prevent unauthorized deletion of audit records."]},
{cat:"Label Stocks",cls:"cat-stock",persona:"Label Designer / Print Operator",want:"Select and use configured label stocks when designing labels or creating print requests",benefit:"Labels are printed on the correct stock material with appropriate specifications",ac:["The Label Designer module displays a dropdown or selection field for choosing from available label stocks that have been configured in the Label Stocks module.", "The label stock selection field in Label Designer shows only active and approved label stocks, filtering out any disabled or draft stocks.", "When a label stock is selected in Label Designer, the system displays the stock's key properties including dimensions, material type, and any relevant specifications.", "The Label Designer enforces design constraints based on the selected label stock's dimensions, preventing users from creating designs that exceed the stock's printable area.", "The Print Request module includes a mandatory label stock selection field that must be populated before a print request can be submitted.", "The label stock dropdown in Print Request module displays stocks filtered by compatibility with the selected printer or label template if applicable.", "When creating a print request, the system validates that the selected label stock is compatible with the associated label design and displays an error if incompatible.", "The system displays a clear error message when a user attempts to proceed without selecting a label stock, indicating that label stock selection is required.", "Users can view detailed information about a selected label stock including supplier, cost center, inventory status, or other metadata configured in the Label Stocks module.", "The label stock selection persists when saving a draft label design or print request, allowing users to resume work without re-selecting the stock."]},
{cat:"Label Objects",cls:"cat-object",persona:"Label Designer",want:"Upload and manage logos, regulatory symbols, and pictograms as reusable objects",benefit:"Efficiently use standardized graphics across multiple label designs without duplicating files",ac:["The system shall provide an upload interface that accepts common image file formats including PNG, JPG, JPEG, SVG, and PDF for logos, regulatory symbols, and pictograms.", "The system shall validate uploaded files to ensure they meet minimum quality standards including resolution requirements and file size limits before accepting the upload.", "The system shall allow users to categorize uploaded objects by type such as logos, regulatory symbols, and pictograms during or after the upload process.", "The system shall store uploaded objects in a centralized library that is accessible across all label design projects within the user's workspace or organization.", "The system shall display thumbnails or preview images of all uploaded objects in the library view to enable quick visual identification and selection.", "The system shall allow users to assign descriptive names and metadata tags to uploaded objects to facilitate searching and organization within the library.", "The system shall provide search and filter functionality to locate specific objects by name, category, tags, upload date, or file type within the object library.", "The system shall enable users to edit object metadata including name, category, tags, and description after the initial upload without re-uploading the file.", "The system shall allow users to replace an existing object with a new version while maintaining all references to that object in existing label designs.", "The system shall track version history when objects are replaced, allowing users to view or revert to previous versions if needed for audit or rollback purposes."]},
{cat:"Label Objects",cls:"cat-object",persona:"System Administrator",want:"Enforce file validation rules, version control, and object activation status control",benefit:"Only valid, properly versioned label objects can be activated while maintaining data integrity and audit trails",ac:["The system must validate that all required files are uploaded before allowing a label object to be saved or activated in the system.", "The system must prevent activation of a label object if any mandatory file attachments are missing from the object configuration.", "The system must automatically assign and increment version numbers for label objects whenever changes are made to the object configuration or files.", "The system must maintain a complete version history for each label object, showing all previous versions with timestamps and user information.", "The system must allow users to view and compare different versions of a label object to track changes over time.", "The system must enforce that only one version of a label object can be in 'Active' status at any given time.", "The system must automatically set the previous active version to 'Inactive' status when a new version is activated.", "The system must provide an activation control mechanism that allows authorized users to activate or deactivate label object versions.", "The system must display clear status indicators showing whether a label object version is 'Active', 'Inactive', or 'Draft'.", "The system must validate file formats and reject unsupported file types during the upload process with appropriate error messages."]},
{cat:"Label Objects",cls:"cat-object",persona:"Label Designer",want:"Insert managed objects from the Setup Objects Module into label designs",benefit:"Create dynamic labels with standardized, reusable content elements",ac:["The label design interface displays an option to insert managed objects that are configured in the Setup Objects Module into the current label design.", "Users can browse and search through all available managed objects that have been created in the Setup Objects Module before inserting them.", "Only managed objects that are marked as active or published in the Setup Objects Module are available for insertion into label designs.", "When a user selects a managed object to insert, the system displays a preview of how the object will appear on the label before final insertion.", "The inserted managed object maintains its connection to the original object in the Setup Objects Module, so updates to the source object can propagate to labels.", "Users can position the inserted managed object anywhere on the label canvas using drag-and-drop or coordinate-based placement controls.", "The system allows multiple instances of the same managed object to be inserted into a single label design at different positions.", "Inserted managed objects display visual indicators or metadata showing they are managed objects rather than manually created label elements.", "Users can resize inserted managed objects while maintaining aspect ratio and respecting any size constraints defined in the Setup Objects Module.", "The system prevents users from directly editing the content of inserted managed objects within the label design, requiring edits to be made in the Setup Objects Module."]},
{cat:"Data Placeholders",cls:"cat-placeholder",persona:"System Administrator",want:"Create data placeholders with unique identifier, descriptive text, and database column mapping",benefit:"Establish reusable data references connecting template variables to actual database fields for dynamic content generation",ac:["The system must provide a user interface or API endpoint to create a new data placeholder with all required fields in a single operation.", "Each data placeholder must be assigned a unique identifier that cannot be duplicated within the system and serves as the primary reference key.", "The system must require and validate that the unique identifier field is not empty, does not contain special characters that could break system references, and follows naming conventions.", "Each data placeholder must include a description field that allows administrators to enter explanatory text about the placeholder's purpose and usage context.", "The description field must support a minimum of 255 characters to accommodate detailed explanations and must handle standard alphanumeric and punctuation characters.", "Each data placeholder must include a database column mapping field that specifies the exact database table and column name where the actual data will be retrieved from.", "The database column mapping must be validated to ensure it references an existing and accessible database column before the placeholder can be saved successfully.", "The system must prevent creation of a data placeholder if the unique identifier already exists and display a clear error message indicating the duplicate conflict.", "The system must prevent creation of a data placeholder if the database column mapping references a non-existent or inaccessible database field and provide a specific error message.", "Upon successful creation, the system must persist all three fields (ID, description, database column mapping) to the data placeholders repository or database table."]},
{cat:"Data Placeholders",cls:"cat-placeholder",persona:"System Administrator",want:"Dynamically resolve data placeholders during print request execution",benefit:"Printed documents automatically contain correct real-time data values instead of placeholder tokens",ac:["The system must identify all data placeholders present in the print template when a print request is initiated by the user.", "The system must resolve each data placeholder by retrieving the corresponding actual data value from the appropriate data source or database table.", "The system must replace placeholder tokens with their resolved data values before generating the final print output document.", "The system must support resolution of multiple data placeholders within a single print request without performance degradation.", "The system must handle nested or hierarchical data placeholders and resolve them in the correct order to maintain data integrity.", "The system must validate that all required data placeholders have valid data sources configured before attempting resolution during print execution.", "The system must log a warning message when a data placeholder cannot be resolved due to missing or invalid data source configuration.", "The system must display a user-friendly error message when critical data placeholders fail to resolve, preventing incomplete document printing.", "The system must support real-time data resolution, ensuring that the most current data values are retrieved at the moment of print execution.", "The system must handle data type conversions automatically when resolving placeholders, such as formatting dates, numbers, and currency values appropriately."]},
{cat:"Data Placeholders",cls:"cat-placeholder",persona:"System Administrator",want:"Prevent changes to data placeholder mappings once used in approved labels",benefit:"Data integrity is maintained and approved labels remain valid and consistent with original placeholder definitions",ac:["The system must detect when a data placeholder has been used in one or more labels that have reached approved status before allowing any mapping modifications.", "When a user attempts to edit the mapping of a placeholder that is used in approved labels, the system must block the edit action and display a clear error message.", "The error message must explicitly state that the placeholder cannot be modified because it is being used in approved labels and provide guidance on next steps.", "The system must make mapping fields read-only or disable edit buttons for placeholders that are currently used in any approved label.", "A visual indicator such as a lock icon or disabled state must be displayed next to placeholders that cannot be modified due to usage in approved labels.", "The system must allow viewing of placeholder mapping details even when the placeholder is locked from editing due to approved label usage.", "If a placeholder is used only in draft or pending labels but not in approved labels, the system must continue to allow mapping changes without restrictions.", "When an approved label is reverted to draft status or deleted, the system must re-evaluate whether the associated placeholders can now be edited based on remaining approved label usage.", "The system must maintain an audit trail that logs all attempted mapping change requests, including blocked attempts on placeholders used in approved labels.", "If multiple labels use the same placeholder and at least one is approved, the mapping lock must remain in effect regardless of the status of other labels."]},
{cat:"Data Placeholders",cls:"cat-placeholder",persona:"Product Administrator",want:"Define formatting and validation rules for data placeholders",benefit:"Ensure data consistency and enforce business rules across all placeholder usage in the system",ac:["The system must allow administrators to define data type constraints for each placeholder including text, number, date, email, URL, boolean, and custom types.", "The system must support minimum and maximum length validation rules for text-based placeholders with configurable character limits.", "The system must support numeric range validation allowing administrators to set minimum and maximum values for number-type placeholders.", "The system must support date format validation with configurable formats such as MM/DD/YYYY, DD/MM/YYYY, YYYY-MM-DD, and custom date patterns.", "The system must support date range validation allowing administrators to set earliest and latest acceptable dates for date-type placeholders.", "The system must support email format validation using standard RFC 5322 email address validation rules for email-type placeholders.", "The system must support URL format validation ensuring proper protocol, domain, and path structure for URL-type placeholders.", "The system must allow administrators to define custom regex patterns for advanced validation requirements on any placeholder type.", "The system must support required field validation allowing administrators to mark placeholders as mandatory or optional.", "The system must support enumerated value lists allowing administrators to define a fixed set of acceptable values for dropdown-style placeholders."]},
{cat:"Phrases & Translations",cls:"cat-phrase",persona:"System Administrator",want:"Create primary English phrases with unique ID, description, and label text",benefit:"Establish foundational phrase library as master reference for translations into other languages",ac:["The system must allow creation of a new phrase record with three mandatory fields: unique phrase ID, description field, and label text field.", "The phrase ID must be a unique identifier that cannot be duplicated within the system and serves as the primary key for the phrase record.", "The phrase ID field must enforce uniqueness validation and display an error message if a duplicate ID is entered during creation.", "The description field must accept alphanumeric text and special characters to allow detailed explanation of the phrase's purpose and context of use.", "The label text field must store the actual English text content that will be displayed in the application user interface.", "All three fields (phrase ID, description, and label text) must be marked as required fields and prevent saving if any field is left empty.", "The system must display appropriate validation error messages when required fields are missing, specifying which field needs to be completed.", "Upon successful creation, the new phrase must be saved to the database with a timestamp indicating when it was created.", "The newly created phrase must be designated as the primary English version that will serve as the source for all future translations.", "The system must provide immediate visual confirmation upon successful phrase creation, such as a success message or redirect to the phrase list view."]},
{cat:"Phrases & Translations",cls:"cat-phrase",persona:"Content Manager",want:"Add and manage translations for phrases in multiple target languages",benefit:"Provide localized content to users in different regions and maintain accurate multilingual support",ac:["The system shall allow users to add one or more translations for an existing phrase by selecting the phrase from the phrase management interface.", "The system shall display a list of available target languages that can be selected when adding a new translation to a phrase.", "The system shall require users to select a target language before entering the translation text to ensure proper language association.", "The system shall validate that translation text is provided and not empty before allowing the translation to be saved.", "The system shall prevent duplicate translations for the same phrase and target language combination, displaying an error message if a duplicate is attempted.", "The system shall display all existing translations for a selected phrase, showing the target language and translated text for each entry.", "The system shall allow users to edit existing translations by selecting the translation and modifying the text content.", "The system shall allow users to delete translations from a phrase, removing the association between the phrase and the specific target language.", "The system shall prompt for confirmation before permanently deleting a translation to prevent accidental data loss.", "The system shall save all translation changes immediately or provide a clear save action to persist modifications to the database."]},
{cat:"Phrases & Translations",cls:"cat-phrase",persona:"System Administrator",want:"Enforce only one translation per phrase per language with proper RTL/LTR text rendering support",benefit:"Translation consistency is maintained and text displays correctly based on language directionality",ac:["The system must prevent creating duplicate translations for the same phrase in the same language, enforcing a unique constraint at the database level.", "When attempting to add a second translation for an existing phrase-language combination, the system must display a clear error message indicating that a translation already exists for this phrase in the selected language.", "The system must automatically detect whether a language uses right-to-left (RTL) or left-to-right (LTR) text direction based on the language selection.", "For RTL languages such as Arabic, Hebrew, Farsi, and Urdu, the translation input field and display must render text from right to left with proper alignment.", "For LTR languages such as English, Spanish, French, and German, the translation input field and display must render text from left to right with proper alignment.", "The text direction (RTL/LTR) must be applied consistently across all translation display areas including input fields, preview panels, and list views.", "When editing an existing translation, the system must maintain the one-translation-per-phrase-per-language constraint and prevent changing the language to one that already has a translation for that phrase.", "The user interface must provide visual indicators or styling that clearly shows the text direction being used for each translation field.", "Mixed-direction content (such as English words within Arabic text) must be handled correctly with proper bidirectional text algorithm support.", "The system must store the language directionality metadata alongside each translation to ensure consistent rendering across different user sessions and devices."]},
{cat:"Approval Groups",cls:"cat-approval",persona:"System Administrator",want:"Create approval groups and associate specific approver users to each group",benefit:"Organize and manage label approval workflow efficiently by assigning the right approvers to review and approve labels",ac:["The system must provide a user interface to create new approval groups with a unique group name and optional description field.", "The system must validate that the approval group name is unique and does not already exist in the system before allowing creation.", "The system must allow the administrator to add multiple approver users to an approval group during the group creation process.", "The system must display a searchable list of all available users in the system when selecting approvers to add to the group.", "The system must allow the administrator to filter users by role, department, or other relevant attributes when selecting approvers for the group.", "The system must validate that at least one approver user is associated with an approval group before allowing the group to be saved.", "The system must allow the administrator to remove approver users from an approval group after it has been created.", "The system must allow the administrator to add additional approver users to an existing approval group at any time.", "The system must display a confirmation message when an approval group is successfully created with associated approvers.", "The system must display an error message if the approval group creation fails due to validation errors or system issues."]},
{cat:"Approval Groups",cls:"cat-approval",persona:"System Administrator",want:"Define approval rules requiring ALL users or ANY one user to approve",benefit:"Implement flexible approval workflows matching business requirements and governance policies",ac:["The system must provide two distinct approval rule options when configuring an approval group: 'ALL users must approve' and 'ANY one user approval is sufficient'", "When 'ALL users must approve' rule is selected, the approval request must remain in pending status until every single user in the approval group has provided their approval", "When 'ALL users must approve' rule is active and one or more users have approved but not all, the system must display a partial approval status showing which users have approved and which are still pending", "When 'ALL users must approve' rule is active and any user in the group rejects the request, the entire approval request must be rejected immediately without waiting for other users", "When 'ANY one user approval is sufficient' rule is selected, the approval request must be automatically approved as soon as the first user in the group approves it", "When 'ANY one user approval is sufficient' rule is active and the first user rejects the request, the system must route to the next user in the group until either one user approves or all users reject", "The approval rule configuration must be mandatory when creating or editing an approval group, with no default selection to ensure intentional configuration", "The system must clearly display the selected approval rule (ALL or ANY) in the approval group summary view and detail view for easy identification", "When changing an approval rule from 'ALL' to 'ANY' or vice versa on an existing approval group, the system must display a warning message about the impact on pending approval requests", "Existing pending approval requests must continue to follow the approval rule that was active when they were initiated, even if the approval group rule is subsequently changed"]},
{cat:"Approval Groups",cls:"cat-approval",persona:"System Administrator",want:"Configure approval groups with country-specific and language-specific settings",benefit:"Approval workflows are properly tailored to different regional and linguistic requirements across the organization",ac:["The system must allow administrators to create approval groups with country-specific configurations that can be assigned to one or multiple countries from a predefined list of supported countries.", "The system must allow administrators to create approval groups with language-specific configurations that can be assigned to one or multiple languages from a predefined list of supported languages.", "Administrators must be able to combine both country and language specifications for a single approval group, enabling configurations like 'Germany + German language' or 'Switzerland + French language'.", "The approval group configuration interface must display all currently configured country-language combinations in a searchable and sortable table or list view.", "The system must validate that at least one country or language is selected when creating or updating an approval group configuration to prevent incomplete setups.", "When an approval group is assigned to multiple countries, the system must allow independent configuration of approval rules and members for each country within that group.", "When an approval group is assigned to multiple languages, the system must allow independent configuration of approval rules and members for each language within that group.", "The system must prevent duplicate approval group configurations for the same country-language combination and display a clear error message if a duplicate is attempted.", "Administrators must be able to edit existing country-specific and language-specific approval group configurations without affecting active approval workflows that reference those groups.", "The system must provide the ability to deactivate or archive country-specific or language-specific approval group configurations rather than permanently deleting them to maintain audit history."]},
{cat:"Approval Groups",cls:"cat-approval",persona:"System Administrator",want:"Automatically enforce audit trail tracking and lifecycle control for all approval group operations",benefit:"Every change to approval groups is logged for compliance and groups follow proper activation/deactivation workflows",ac:["The system must automatically capture and log the user ID, timestamp, and action type for every create operation performed on an approval group.", "The system must automatically capture and log the user ID, timestamp, and action type for every update or modification operation performed on an approval group.", "The system must automatically capture and log the user ID, timestamp, and action type for every delete or deactivation operation performed on an approval group.", "The audit trail must record all field-level changes including the previous value and new value for any modified approval group attribute.", "The audit log entries for approval groups must be immutable and cannot be edited or deleted by any user including system administrators.", "The system must provide a dedicated audit trail view that displays the complete history of changes for each approval group in chronological order.", "The audit trail view must allow filtering by date range, user, action type, and approval group name to facilitate compliance reporting and investigations.", "The system must enforce that approval groups can only exist in defined lifecycle states such as Draft, Active, Inactive, or Archived.", "The system must prevent approval groups in Draft status from being used in any approval workflows until they are transitioned to Active status.", "The system must require appropriate user permissions before allowing lifecycle state transitions such as activating, deactivating, or archiving an approval group."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Work with a graphical canvas editor with defined dimensions and interchangeable measurement units for rulers",benefit:"Design labels with precise measurements in preferred unit system",ac:["The canvas editor displays a graphical design area with clearly defined and configurable dimensions that can be set by the user.", "The canvas supports horizontal and vertical rulers along the top and left edges to help users measure and position elements accurately.", "Users can switch between different measurement units for the rulers including millimeters, centimeters, inches, and pixels through a unit selector.", "When the measurement unit is changed, all ruler markings and displayed measurements update immediately to reflect the selected unit without requiring a page refresh.", "The canvas dimensions can be specified using the currently selected measurement unit and the system converts between units accurately maintaining precision.", "Ruler markings display major and minor tick marks with appropriate intervals based on the selected measurement unit for optimal readability.", "The canvas editor displays the current dimensions of the canvas in the selected measurement unit in a visible location on the interface.", "When hovering over or dragging elements on the canvas, position indicators show the current coordinates in the selected measurement unit.", "The canvas maintains aspect ratio and scaling when switching between measurement units to ensure design integrity is preserved.", "Grid lines on the canvas align with the ruler markings and adjust spacing automatically when measurement units are changed."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Use comprehensive design tools including alignment helpers, gridlines, rulers, zoom controls, toolbars, and context menus",benefit:"Precisely position and manipulate label elements with professional-grade accuracy and efficiency",ac:["The design interface must provide alignment tools that allow users to align selected elements to the left, right, top, bottom, center horizontally, and center vertically relative to each other or the canvas.", "The system must display configurable gridlines on the canvas that help users visually align and position label elements with consistent spacing and placement.", "Users must be able to toggle gridlines on and off through a toolbar button or menu option without affecting the actual label design output.", "The interface must provide snap-to-grid functionality that automatically aligns elements to the nearest gridline intersection when dragging or resizing elements.", "Users must be able to configure grid spacing and granularity settings to adjust the density of gridlines based on their design precision requirements.", "The design canvas must display horizontal and vertical rulers along the top and left edges showing measurements in the selected unit system (inches, millimeters, or centimeters).", "Rulers must display accurate measurements that correspond to the actual physical dimensions of the label being designed, accounting for the current zoom level.", "The system must provide zoom functionality with multiple zoom levels including fit-to-screen, actual size (100%), and custom zoom percentages ranging from 25% to 400%.", "Users must be able to zoom in and out using toolbar buttons, keyboard shortcuts (Ctrl/Cmd + Plus for zoom in, Ctrl/Cmd + Minus for zoom out), and mouse wheel scrolling.", "The zoom control must display the current zoom percentage and allow users to select preset zoom levels from a dropdown menu or enter a custom zoom percentage."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Create new labels on blank canvas, modify existing labels, and use templates",benefit:"Efficiently design and manage clinical labels without starting from scratch each time",ac:["The system shall provide a blank canvas option that allows users to create a new label design from scratch with no pre-populated content or elements.", "The system shall allow users to select from a library of pre-defined label templates that can be used as starting points for new label designs.", "Users shall be able to add text fields, images, barcodes, QR codes, and other standard label elements to the blank canvas using drag-and-drop or insert functionality.", "The system shall provide tools to modify existing label properties including dimensions, orientation (portrait or landscape), and background color or pattern.", "Users shall be able to edit existing labels by opening them from a saved labels list or repository and making changes to any element or property.", "The system shall allow users to modify text properties on existing labels including font type, font size, font color, bold, italic, underline, and text alignment.", "Users shall be able to reposition, resize, and rotate any element on the label canvas using mouse controls or numeric input fields for precise placement.", "The system shall provide an undo and redo functionality to allow users to revert or reapply changes made during the label creation or modification process.", "When using a template, users shall be able to customize all template elements including text, images, and layout while preserving the overall template structure if desired.", "The system shall allow users to save modified templates as new custom templates for future reuse by other users or the same user."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Select from predefined label stock options when starting a new label design",benefit:"Labels are designed to correct dimensions and specifications for printing",ac:["The system displays a list or catalog of predefined label stock options when the user initiates a new label design workflow.", "Each predefined label stock option displays key specifications including dimensions, shape, material type, and any relevant manufacturer information.", "The user can browse through available label stock options using search, filter, or category navigation functionality.", "The user can select a single predefined label stock option from the available choices to serve as the foundation for their label design.", "Upon selecting a predefined label stock, the system initializes a new label design canvas with dimensions and properties matching the selected stock specifications.", "The selected label stock's dimensions constrain the design area, preventing users from placing design objects outside the printable boundaries.", "The system displays the selected label stock name and specifications in a visible location within the label designer interface for reference.", "If no label stock is selected, the system prevents the user from proceeding to add design objects and displays an appropriate prompt or message.", "The user can change the selected label stock before adding design objects, with the system updating the canvas dimensions accordingly.", "If the user attempts to change label stock after design objects have been added, the system displays a warning message about potential loss of design elements that may fall outside new dimensions."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Insert shapes (lines, rectangles, ovals) into label designs",benefit:"Create visually organized and structured clinical labels with graphical elements that enhance readability",ac:["The system provides a shapes toolbar or menu option that allows users to select from at least three shape types: lines, rectangles, and ovals.", "Users can click or select a shape type from the toolbar and then click or drag on the label canvas to insert that shape at the desired location.", "Inserted lines can be drawn horizontally, vertically, or at any angle by clicking a start point and dragging to an end point on the canvas.", "Inserted rectangles can be created by clicking a corner point and dragging to define the opposite corner, creating rectangles of any size within the canvas boundaries.", "Inserted ovals can be created by clicking a point and dragging to define the bounding box, creating ovals and circles of any size within the canvas boundaries.", "Each inserted shape appears as a distinct object on the label canvas that can be selected, moved, resized, and deleted independently of other design elements.", "Users can select an existing shape by clicking on it, with visual feedback such as selection handles or a highlighted border indicating the shape is selected.", "Selected shapes can be moved to a new position on the canvas by clicking and dragging them to the desired location.", "Selected shapes can be resized using corner or edge handles that appear when the shape is selected, maintaining or allowing aspect ratio changes as appropriate.", "The system allows users to modify shape properties including line thickness, line color, line style (solid, dashed, dotted), and fill color for closed shapes like rectangles and ovals."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Insert images and managed objects into label designs",benefit:"Create comprehensive and compliant clinical labels with visual elements and standardized content",ac:["The system shall provide a mechanism to insert images into the label design canvas from a file upload dialog supporting common image formats including PNG, JPG, JPEG, GIF, BMP, and TIFF.", "The system shall allow users to insert managed objects that have been pre-configured in the system's managed object library or repository into the label design.", "When an image is inserted, the system shall display it on the label design canvas at a default size and position that can be subsequently modified by the user.", "When a managed object is inserted, the system shall render it on the label design canvas with all its configured properties including text, formatting, and any embedded variables or fields.", "The system shall allow users to select an inserted image on the canvas and resize it by dragging corner or edge handles while maintaining or optionally breaking the aspect ratio.", "The system shall allow users to select and move inserted images and managed objects to any position on the label design canvas using drag-and-drop functionality.", "The system shall provide rotation capabilities for inserted images allowing users to rotate images to any angle either through rotation handles or by entering specific degree values.", "The system shall maintain the quality and resolution of inserted images appropriate for clinical label printing requirements without pixelation or degradation during resize operations within reasonable bounds.", "The system shall allow users to delete inserted images and managed objects from the label design by selecting them and using a delete button, keyboard shortcut, or context menu option.", "The system shall support layering of inserted objects allowing users to bring images and managed objects to front or send them to back relative to other design elements on the canvas."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Add and configure placeholder types (free text, predefined phrases, data, runtime, visit placeholders)",benefit:"Create dynamic, reusable labels that automatically populate with correct information during clinical operations",ac:["The system shall provide an option to add free text placeholders that allow users to enter custom text content directly into the label template without predefined constraints.", "The system shall provide an option to add predefined phrase placeholders that allow users to select from a predetermined list of standardized text phrases approved for clinical use.", "The system shall provide an option to add data placeholders that automatically populate with information from the clinical database or patient records at the time of label generation.", "The system shall provide an option to add runtime placeholders that prompt users to enter or select specific values when the label is being printed or generated in real-time.", "The system shall provide an option to add visit placeholders that automatically populate with visit-specific information such as visit date, visit number, or visit type from the clinical trial schedule.", "Each placeholder type shall be clearly distinguishable in the label designer interface through unique icons, labels, or visual indicators to prevent user confusion.", "Users shall be able to configure properties for each placeholder type including field name, default values, required/optional status, and formatting options such as font size and alignment.", "The system shall validate that all required placeholder configurations are completed before allowing the user to save or activate the label template.", "When a free text placeholder is added, the system shall allow users to specify maximum character length, text formatting rules, and validation patterns if needed.", "When a predefined phrase placeholder is added, the system shall display the available phrase library and allow users to select which phrases are valid options for that specific placeholder."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Configure dynamic data fields linked to clinical trial data with conditional display rules and formatting options",benefit:"Labels automatically populate with correct trial information and display only relevant data based on conditions",ac:["The system shall allow users to add placeholder fields to label templates that can be linked to specific clinical trial data sources and attributes.", "Users shall be able to select from a predefined list of available clinical trial data fields when configuring a placeholder, including but not limited to patient ID, trial protocol number, medication name, dosage, administration route, and expiration date.", "The system shall provide a configuration interface where users can define conditional display rules for each placeholder based on data values, field presence, or other placeholders.", "Users shall be able to configure multiple conditional display rules per placeholder using AND/OR logic operators to create complex display conditions.", "The system shall support hiding or showing placeholder content based on whether specified conditions evaluate to true or false at label generation time.", "Users shall be able to define formatting rules for placeholder data including text case (uppercase, lowercase, title case), date formats, number formats, and decimal precision.", "The system shall allow users to specify default values or fallback text that displays when the linked clinical trial data is null, empty, or unavailable.", "Users shall be able to configure text prefixes and suffixes for placeholder fields that appear before or after the dynamic data value when rendered.", "The system shall provide a preview function that shows how the placeholder will render with sample data and applied conditional logic before saving the configuration.", "The system shall validate that all conditional display rules reference valid data fields and display appropriate error messages when invalid field references are detected."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Render existing placeholder fields as barcodes with selectable barcode formats",benefit:"Display data in machine-readable barcode formats on clinical labels instead of plain text",ac:["The system shall provide an option to render any existing placeholder field as a barcode instead of plain text on the label design canvas.", "The system shall display a barcode format selector when the user chooses to render a placeholder as a barcode.", "The barcode format selector shall include commonly used clinical barcode formats such as Code 128, Code 39, QR Code, Data Matrix, and PDF417.", "The system shall render the placeholder field value as a barcode using the selected barcode format in real-time on the label designer canvas.", "The barcode rendering shall accurately encode the placeholder field value according to the specifications of the selected barcode format.", "The system shall allow users to switch between different barcode formats for the same placeholder field and update the visual representation immediately.", "The system shall display an error message if the placeholder field value contains characters or data that are incompatible with the selected barcode format.", "The system shall maintain the barcode format selection when the label design is saved and reloaded for future editing sessions.", "The system shall allow users to toggle between barcode rendering and plain text rendering for any placeholder field without losing the configured barcode format settings.", "The barcode shall be rendered with appropriate sizing and scaling to ensure it remains scannable and fits within the designated placeholder field area on the label."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Apply rich text formatting, shapes, and borders to label elements",benefit:"Create visually clear and compliant clinical labels meeting regulatory standards with improved readability",ac:["The system shall allow users to apply bold formatting to selected text within any label element.", "The system shall allow users to apply italic formatting to selected text within any label element.", "The system shall allow users to apply underline formatting to selected text within any label element.", "The system shall allow users to apply strikethrough formatting to selected text within any label element.", "The system shall allow users to change font family for selected text from a predefined list of available fonts.", "The system shall allow users to change font size for selected text with a minimum size of 6pt and maximum size of 72pt.", "The system shall allow users to change text color for selected text using a color picker or predefined color palette.", "The system shall allow users to apply text highlighting or background color to selected text within label elements.", "The system shall allow users to change text alignment options including left, center, right, and justify for text within label elements.", "The system shall allow users to apply superscript formatting to selected text for scientific notations or trademark symbols."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Automatically handle language orientation (LTR/RTL) for multilingual content",benefit:"Labels display text correctly according to each language's reading direction with proper formatting",ac:["The system automatically detects and applies left-to-right (LTR) orientation for languages such as English, French, German, Spanish, and other Latin-script based languages on the label.", "The system automatically detects and applies right-to-left (RTL) orientation for languages such as Arabic, Hebrew, Urdu, and other RTL languages on the label.", "When a label contains multiple languages with different orientations, each language section maintains its correct orientation independently without affecting other language sections.", "Text alignment adjusts automatically based on language orientation, with LTR languages aligning left by default and RTL languages aligning right by default.", "Punctuation marks, numbers, and special characters display correctly according to the orientation rules of their associated language context.", "Bidirectional text (mixed LTR and RTL content within the same text block) renders correctly with proper character ordering and display direction.", "The system preserves the intended layout structure and spacing when switching between LTR and RTL orientations within the same label design.", "Labels with RTL languages display mirrored UI elements appropriately, such as icons, bullets, and directional indicators that need to flip for RTL reading flow.", "The orientation settings persist correctly when saving, previewing, and printing labels with multilingual content containing different text directions.", "Users can preview how the label will appear in different language orientations before finalizing the design to verify correct rendering."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Position, resize, and layer objects on canvas using drag-and-drop and property panels",benefit:"Create custom label layouts meeting specific clinical labeling requirements and visual design standards",ac:["Users can select any object on the label canvas by clicking on it, with visual indication showing the object is selected through selection handles or highlighting.", "Users can drag selected objects to any position on the label canvas using mouse click-and-drag, with the object moving in real-time as the mouse moves.", "Users can drop objects at the desired position by releasing the mouse button, with the object remaining at that position until moved again.", "The system displays precise X and Y coordinate values in the property panel for the selected object's current position on the canvas.", "Users can manually enter exact X and Y coordinate values in the property panel to position objects with pixel-perfect precision.", "Users can resize objects by dragging corner or edge handles that appear when an object is selected, maintaining or adjusting aspect ratio as appropriate.", "The property panel displays width and height dimensions for the selected object, updating in real-time as the object is resized.", "Users can manually enter exact width and height values in the property panel to resize objects to specific dimensions.", "The system provides layering controls allowing users to move objects forward or backward in the z-order relative to other objects on the canvas.", "Users can bring an object to the front of all other objects using a 'Bring to Front' command in the property panel or context menu."]},
