{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Create, store, and reuse label templates with all design elements and configurations",benefit:"Efficiently produce consistent labels without redesigning from scratch each time",ac:["The system shall provide a 'Save as Template' option that allows users to save the current label design including all text fields, images, barcodes, and layout configurations as a reusable template.", "Users shall be able to assign a unique template name with a minimum of 3 characters and maximum of 100 characters when saving a template.", "The system shall validate that template names are unique within the user's workspace and display an error message if a duplicate name is entered.", "Users shall be able to add an optional description field of up to 500 characters to provide context about the template's intended use or specific characteristics.", "The system shall store all template design elements including fonts, font sizes, colors, alignment settings, field positions, and dimensions exactly as configured in the original design.", "Users shall be able to access a 'Template Library' or 'Template Manager' view that displays all saved templates with their names, descriptions, creation dates, and last modified dates.", "The template library shall support search functionality allowing users to find templates by name or description using partial text matching.", "Users shall be able to filter templates by creation date, last modified date, or alphabetically by name in both ascending and descending order.", "The system shall provide a preview thumbnail or preview option for each saved template showing the visual layout before loading it for use.", "Users shall be able to load a saved template into the label designer workspace with a single click or selection action, replacing the current design."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Preview and print label designs with substituted default values",benefit:"Verify layout and appearance before using in production with actual patient data",ac:["The system shall provide a preview function that displays the label design with default values substituted for all variable fields instead of showing variable placeholders.", "Default values used for preview shall be representative sample data that matches the expected data type and format for each variable field (e.g., sample patient name, sample date, sample barcode).", "The preview shall render the label design exactly as it would appear when printed, including fonts, sizes, colors, borders, images, barcodes, and all other design elements.", "The preview function shall be accessible from the label design editor interface through a clearly labeled 'Preview' button or menu option.", "The system shall display the preview in a modal window or dedicated preview pane that allows users to view the full label without navigating away from the design interface.", "Users shall be able to zoom in and zoom out on the preview to inspect fine details of the label design and verify readability of text and barcode elements.", "The preview shall display the actual dimensions of the label design, showing the size in millimeters or inches to confirm it matches the intended physical label size.", "The system shall provide a 'Print' function directly from the preview interface that sends the previewed label design with default values to the selected printer.", "Users shall be able to select a printer from available printer options before initiating the print operation from the preview interface.", "The print function shall respect all printer settings including orientation, paper size, and print quality as configured in the label design properties."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Enforce and maintain versioning of label designs",benefit:"Track changes, maintain regulatory compliance, and ensure integrity of label design history throughout lifecycle",ac:["The system must automatically create a new version of the label design whenever any modification is made to an existing approved or published label design.", "Each version of a label design must be assigned a unique version number that increments sequentially with each new version created.", "The system must maintain a complete version history for each label design, storing all previous versions with their associated metadata including version number, creation date, author, and change description.", "Users must be able to view the complete version history of any label design, displaying all versions in chronological order with their respective metadata.", "The system must prevent users from editing or modifying any previously saved version of a label design, ensuring all historical versions remain immutable and unchanged.", "Users must be able to compare any two versions of the same label design side-by-side to identify differences in layout, content, fields, or configuration.", "The system must allow users to restore or revert to any previous version of a label design, which should create a new version based on the selected historical version.", "When a new version is created, the system must prompt users to enter or provide a change description or comment explaining what modifications were made in the new version.", "The system must display the current active version number prominently on the label design interface so users can always identify which version they are viewing or working with.", "Users with appropriate permissions must be able to view version details including who created each version, when it was created, and what changes were documented for that version."]},
{cat:"Label Designer",cls:"cat-designer",persona:"System Administrator / QA Personnel",want:"Automatically log all user actions in the Designer Module with complete audit trail",benefit:"Maintain GxP compliance and meet 21 CFR Part 11 regulatory requirements for electronic records and signatures",ac:["The system must log every user action including create, read, update, and delete operations performed on clinical label designs with a unique audit trail entry for each action.", "Each audit log entry must capture the user's unique identifier, full name, and role at the time the action was performed to ensure accountability and traceability.", "Each audit log entry must include a precise timestamp with date, time, and timezone information showing exactly when the action occurred to maintain chronological integrity.", "The system must record the specific action type performed such as label created, label modified, label approved, label rejected, label published, or label deleted in each audit entry.", "Each audit log entry must capture the before and after values for any data modifications to enable complete reconstruction of changes made to clinical labels over time.", "The system must log the IP address and device information from which the user accessed the system to track the source of all actions for security purposes.", "Audit logs must be stored in a tamper-proof, append-only format that prevents any modification or deletion of historical records to ensure data integrity per 21 CFR Part 11 requirements.", "The system must generate and store a cryptographic hash or digital signature for each audit log entry to detect any unauthorized tampering attempts with the audit trail.", "All audit log entries must be retained for the duration required by regulatory guidelines, with a minimum retention period of seven years or as defined by organizational policies.", "The system must provide role-based access to audit logs where only authorized personnel such as QA managers and system administrators can view the complete audit trail information."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Provide electronic signature to finalize label designs",benefit:"Verified audit trail of who approved the final label content for regulatory compliance",ac:["The system must display an e-signature prompt when the user attempts to finalize or lock a label design for production use.", "The e-signature prompt must require the user to enter their unique username and password to authenticate their identity before finalizing the label.", "The system must validate the entered credentials against the user authentication system and reject invalid or incorrect credentials with an appropriate error message.", "Upon successful e-signature authentication, the system must record the user's full name, username, date, timestamp, and IP address in the audit log.", "The e-signature action must permanently associate the signer's identity with the specific version of the label design being finalized.", "The system must display a confirmation message indicating successful e-signature capture and label finalization after authentication is complete.", "The finalized label design must transition to a locked or approved state that prevents further editing without proper authorization or version control.", "The system must display the e-signature details including signer name and timestamp on the label design record for future reference and audit purposes.", "If the user cancels the e-signature prompt, the system must not finalize the label and must keep it in draft or pending state.", "The e-signature functionality must comply with 21 CFR Part 11 requirements for electronic records and electronic signatures in clinical and regulated environments."]},
{cat:"Label Designer",cls:"cat-designer",persona:"System Administrator",want:"Configure role-based access control for the Designer role in the Clinical Label Designer Module",benefit:"Designers have appropriate permissions while maintaining audit and compliance requirements",ac:["The system shall support a dedicated Designer role that can be assigned to users who need to create, edit, and manage clinical label designs within the Clinical Label Designer Module.", "Users assigned the Designer role shall have permission to create new label design templates and save them to the system with appropriate metadata and version tracking.", "Users with the Designer role shall be able to view and edit existing label designs that are in draft or pending approval status, but not designs that are locked or archived.", "The Designer role shall have read-only access to approved and published label designs to reference existing templates without the ability to modify finalized versions.", "Users with the Designer role shall not have permission to approve or publish label designs, ensuring separation of duties between design creation and approval processes.", "The system shall prevent Designer role users from deleting approved or published label designs, but shall allow them to delete their own draft designs that have not been submitted for review.", "All actions performed by users with the Designer role shall be automatically logged in the audit trail including user ID, timestamp, action type, and affected label design identifier.", "The Designer role shall have access to audit logs related only to their own design activities and shall not be able to view system-wide audit logs or other users' activities.", "Users with the Designer role shall be able to submit completed label designs for review and approval, triggering a status change from draft to pending approval with appropriate notifications.", "The system shall enforce that Designer role users can only access label designs within their assigned organizational units, business units, or product categories based on additional access restrictions."]},
{cat:"Label Designer",cls:"cat-designer",persona:"Clinical Label Designer",want:"Create and manage label content in multiple languages with region-specific formatting",benefit:"Ensure compliance with international regulatory requirements and provide accurate localized clinical trial labels",ac:["The system must allow users to select from a comprehensive list of supported languages when creating or editing label content for clinical trial materials.", "Users must be able to add multiple language versions of the same label content within a single label design project without creating duplicate labels.", "The system must provide language-specific text input fields that support Unicode characters and special characters specific to each selected language including non-Latin scripts.", "When a user switches between language versions, the system must preserve all previously entered content and display the appropriate language-specific text without data loss.", "The system must enforce mandatory translation requirements when specified by regulatory rules, preventing label approval until all required language versions are completed.", "Users must be able to define and apply region-specific date formats including DD/MM/YYYY, MM/DD/YYYY, and YYYY-MM-DD based on the target country or region.", "The system must support region-specific number formatting including decimal separators using comma or period and thousand separators based on locale conventions.", "Users must be able to configure region-specific measurement units including metric and imperial systems with automatic conversion capabilities where applicable.", "The system must provide region-specific time format options including 12-hour and 24-hour clock formats based on regional preferences and regulatory requirements.", "When displaying currency values on labels, the system must support multiple currency symbols and formatting conventions appropriate to each target region."]},
{cat:"Label Requests",cls:"cat-request",persona:"User (Label Request Creator)",want:"System automatically generates a unique Label ID and provides a description field",benefit:"Uniquely identify and describe the purpose of each label request",ac:["The system automatically generates a unique Label ID when a new label request is initiated, without requiring manual user input for the ID field.", "The generated Label ID follows a consistent format or pattern that ensures uniqueness across all label requests in the system.", "The Label ID field is displayed as read-only or disabled to prevent users from manually editing the auto-generated identifier.", "A dedicated text input field is provided for users to enter a label description with clear labeling indicating its purpose.", "The label description field accepts alphanumeric characters, spaces, and common punctuation marks to allow flexible description entry.", "The label description field has a defined maximum character limit that is clearly communicated to the user during data entry.", "The system displays a character counter or remaining character indicator when the user is entering the label description.", "Validation is performed on the label description field to ensure it is not left empty when submitting the label request.", "An appropriate error message is displayed if the user attempts to proceed without entering a label description.", "The label description field supports multi-line text entry if the description requires detailed information spanning multiple lines."]},
{cat:"Label Requests",cls:"cat-request",persona:"User (Label Request Creator)",want:"Optionally associate protocol countries and specify label stock sizes",benefit:"Provide complete information about where labels will be used and what physical sizes are needed",ac:["The label request form includes an optional field or section to associate one or multiple protocol countries to the request.", "Users can select protocol countries from a predefined list or dropdown that displays all available countries relevant to the protocol.", "The system allows users to proceed with creating a label request without selecting any protocol countries, as this association is optional.", "The label request form includes an optional field or section to specify one or multiple label stock sizes for the request.", "Users can select label stock sizes from a predefined list of available physical label dimensions or size codes.", "The system allows users to proceed with creating a label request without selecting any label stock sizes, as this specification is optional.", "When protocol countries are selected, they are displayed clearly in the label request form showing which countries have been associated.", "When label stock sizes are selected, they are displayed clearly in the label request form showing which sizes have been specified.", "Users can add multiple protocol countries to a single label request if needed for multi-country label requirements.", "Users can add multiple label stock sizes to a single label request if different sizes are needed for the same request."]},
{cat:"Label Requests",cls:"cat-request",persona:"User (Label Request Creator)",want:"Complete and submit label request with an electronic signature",benefit:"Formally authorize the request and move it forward in the approval workflow without physical signatures",ac:["The system must provide an e-signature capability that is accessible from the label request form once all required fields are completed and validated.", "Users must be able to apply their electronic signature to the label request by clicking a designated 'Sign' or 'E-Sign' button within the label request interface.", "The e-signature action must capture and store the user's full name, user ID, timestamp (date and time), and IP address as part of the signature record.", "Once the e-signature is applied, the system must display a visual indicator or confirmation message stating that the request has been electronically signed by the user.", "The signed label request must automatically transition to a 'Submitted' or 'Pending Approval' status after the e-signature is successfully applied.", "The system must prevent any modifications to the label request content after the e-signature has been applied, making all fields read-only except for authorized approvers.", "Users must be able to review a summary or preview of the complete label request before applying their e-signature to ensure accuracy.", "The e-signature functionality must comply with applicable electronic signature regulations and standards (such as 21 CFR Part 11 for regulated industries if applicable).", "If the user attempts to submit or sign an incomplete label request with missing required fields, the system must display validation error messages identifying the specific fields that need completion.", "The system must send an automated notification or confirmation email to the user after they successfully complete and e-sign the label request."]},
{cat:"Label Requests",cls:"cat-request",persona:"User (With Appropriate Permissions)",want:"Approve label requests using e-signature with configurable workflows supporting same-user or different-user approval",benefit:"Ensure proper authorization and compliance controls enforced according to business requirements",ac:["The system must provide a configuration setting that determines whether label request approval requires the same user who created the request or a different user to approve it.", "When the configuration is set to 'different-user approval', the system must prevent the user who created the label request from approving their own request.", "When the configuration is set to 'same-user approval', the system must allow the user who created the label request to also approve it.", "The approval action must require the user to provide an e-signature before the approval can be completed and recorded in the system.", "The e-signature capture interface must display the user's full name and timestamp at the time of signature to ensure traceability and audit compliance.", "The system must validate that the user attempting to approve the label request has the necessary permissions or role to perform approval actions.", "If a user without approval permissions attempts to approve a label request, the system must display an error message indicating insufficient permissions and prevent the approval action.", "When different-user approval is configured and the creator attempts to approve their own request, the system must display a clear error message stating that self-approval is not permitted.", "Upon successful approval with e-signature, the label request status must be updated to 'Approved' and the approval timestamp, approver name, and e-signature must be recorded in the system.", "The system must maintain a complete audit trail showing who created the label request, who approved it, the e-signature details, and the timestamps for both creation and approval actions."]},
{cat:"Approval Workflow",cls:"cat-workflow",persona:"Label Design Manager",want:"View list of all completed label designs available for approval initiation",benefit:"Select appropriate designs to submit for the approval workflow process",ac:["The system displays a dedicated list view showing only label designs that have a status of 'completed' and are eligible for approval initiation.", "Each label design entry in the list displays the design name, design ID, completion date, designer name, and product category for easy identification.", "The list includes a visual indicator or status badge clearly showing that each design is in 'completed' status and ready for approval workflow.", "The list provides search functionality allowing users to filter designs by design name, designer name, product category, or completion date range.", "The list supports sorting capabilities on columns including design name, completion date, designer name, and product category in both ascending and descending order.", "Each label design entry includes a selectable action button or checkbox to enable the user to initiate the approval workflow for that specific design.", "The system displays pagination controls when the number of completed designs exceeds the default page size, with configurable items per page options.", "The list view shows a 'No completed designs available' message when there are no label designs in completed status eligible for approval initiation.", "The system prevents designs that are already in an active approval workflow from appearing in the list to avoid duplicate approval processes.", "The list refreshes automatically or provides a manual refresh option to display newly completed designs without requiring the user to navigate away and back."]},
{cat:"Approval Workflow",cls:"cat-workflow",persona:"Label Design Manager",want:"Assign country-specific and language-specific approver groups to label designs when initiating approval",benefit:"Correct regional and linguistic experts review and approve labels per local regulatory and business requirements",ac:["The system shall allow the user to select one or more country-specific approver groups from a predefined list when initiating the approval workflow for a label design.", "The system shall allow the user to select one or more language-specific approver groups from a predefined list when initiating the approval workflow for a label design.", "The system shall support assignment of multiple approver groups simultaneously, allowing combinations of different countries and languages for a single label design.", "The country-specific approver groups list shall display all available countries relevant to the organization's operations and be maintained through administrative configuration.", "The language-specific approver groups list shall display all available languages relevant to the organization's label requirements and be maintained through administrative configuration.", "The system shall validate that at least one approver group (either country-specific or language-specific) is assigned before allowing the approval workflow to be initiated.", "The system shall display a clear error message if the user attempts to initiate the approval workflow without assigning any approver groups, preventing workflow submission.", "The assigned country-specific and language-specific approver groups shall be visible in the label design approval workflow summary and audit trail.", "The system shall allow users to modify assigned approver groups before the approval workflow is formally initiated or submitted.", "Once the approval workflow is initiated, the system shall route the label design to all members of the assigned country-specific and language-specific approver groups for review."]},
{cat:"Approval Workflow",cls:"cat-workflow",persona:"Label Approval Initiator",want:"Select internal or external approval routing and configure parallel or sequential execution",benefit:"Correct approval workflow is followed based on label change nature and organizational requirements",ac:["The system must provide a selection option to designate the approval type as either 'Internal' or 'External' when initiating a label approval workflow.", "When 'Internal' approval type is selected, the system must restrict the approver selection pool to only internal stakeholders within the organization.", "When 'External' approval type is selected, the system must allow selection of external approvers such as regulatory bodies, partners, or external consultants.", "The system must provide a configuration option to set the approval flow as either 'Parallel' or 'Sequential' independent of the approval type selection.", "When 'Parallel' approval flow is selected, the system must send approval requests to all designated approvers simultaneously at the same time.", "When 'Sequential' approval flow is selected, the system must send approval requests to approvers one at a time in the order specified by the initiator.", "In sequential approval flow, the system must not send the approval request to the next approver until the current approver has completed their review and approval action.", "The system must allow the initiator to define and reorder the sequence of approvers when sequential approval flow is selected.", "The system must display a clear visual indicator showing whether the current workflow is configured as parallel or sequential on the workflow summary screen.", "The system must validate that at least one approver is selected before allowing the workflow to be submitted, regardless of approval type or flow configuration."]},
{cat:"Approval Workflow",cls:"cat-workflow",persona:"User (With Approval Responsibilities)",want:"View all labels assigned to approval groups for review",benefit:"Efficiently identify and prioritize labels to approve or reject",ac:["The system displays a dedicated view or list showing all labels that are currently assigned to any approval group where the logged-in user is a member or approver.", "Each label displayed in the list shows key identifying information including label name, label design preview or thumbnail, and current approval status.", "The list indicates which specific approval group each label has been assigned to, allowing users who belong to multiple approval groups to distinguish between assignments.", "Labels are clearly marked with their current workflow state such as pending review, awaiting approval, approved, or rejected to provide immediate status visibility.", "The display includes the date and time when each label was submitted or assigned to the approval group for tracking and prioritization purposes.", "Users can see who submitted or created each label awaiting approval to provide context and enable follow-up communication if needed.", "The system provides filtering capabilities allowing users to narrow the list by approval group, submission date range, label status, or submitter name.", "The system provides sorting options enabling users to organize labels by submission date, label name, status, or approval group in ascending or descending order.", "When a user belongs to multiple approval groups, the system clearly distinguishes labels assigned to different groups without duplication or confusion.", "The display updates in real-time or near real-time when new labels are assigned to the user's approval groups without requiring manual page refresh."]},
{cat:"Approval Workflow",cls:"cat-workflow",persona:"Label Reviewer",want:"View label designs in read-only mode to scrutinize all content details",benefit:"Thoroughly evaluate label before making approval decision without accidentally modifying the design",ac:["The system displays the complete label design in a read-only viewing mode that prevents any editing or modification of the label content by the reviewer.", "All text elements on the label including product name, ingredients, warnings, nutritional information, and regulatory statements are clearly visible and readable in the read-only view.", "All graphical elements including logos, images, barcodes, and design elements are rendered accurately and at full resolution in the read-only view.", "The system provides zoom functionality allowing reviewers to magnify specific sections of the label design to scrutinize fine print and small details.", "The read-only view displays the label in its actual size dimensions with an option to view at different scale percentages for detailed inspection.", "Color accuracy is maintained in the read-only view, showing all colors exactly as they will appear on the printed label.", "The system displays metadata about the label including version number, creation date, last modified date, designer name, and current approval status.", "Reviewers can navigate between multiple pages or panels if the label design consists of multiple sides or components without losing their review context.", "The interface clearly indicates that the view is read-only through visual cues such as disabled edit buttons, read-only watermarks, or explicit status messages.", "The system prevents any copy-paste, drag-drop, or other modification attempts in the read-only mode and displays appropriate error messages if attempted."]},
{cat:"Approval Workflow",cls:"cat-workflow",persona:"Label Reviewer",want:"Approve or reject labels using e-signature with automatic status transition to Approved or QA Review",benefit:"Efficiently complete review process with proper authorization and tracking",ac:["When a reviewer chooses to approve a label, the system must prompt for an e-signature before completing the approval action.", "When a reviewer chooses to reject a label, the system must prompt for an e-signature before completing the rejection action.", "The e-signature capture interface must include fields for username, password, and timestamp to ensure proper authentication and audit trail.", "Upon successful e-signature validation for an approval action, the label status must automatically transition to 'Approved' status.", "Upon successful e-signature validation for a rejection action, the label status must automatically transition to 'QA Review' status for further investigation.", "The system must validate the e-signature credentials against the authenticated user's account before allowing the status transition to proceed.", "If the e-signature validation fails due to incorrect credentials, the system must display an error message and prevent the status transition from occurring.", "The approval or rejection action must be logged in the audit trail with the e-signature details, timestamp, user information, and the resulting status change.", "After successful approval, the label record must display the 'Approved' status with the approver's name, e-signature timestamp, and approval date visible to authorized users.", "After successful rejection, the label record must display the 'QA Review' status with the reviewer's name, e-signature timestamp, and rejection date visible to authorized users."]},
{cat:"QA Review",cls:"cat-workflow",persona:"QA User",want:"View labels in QA Review status",benefit:"Review and approve them as part of quality assurance workflow",ac:["The system displays a list of all labels that have been submitted and are currently in QA Review status for QA users to access.", "Only labels with QA Review status are shown in the display list, excluding labels in draft, approved, rejected, or any other status.", "QA users can access this display through a dedicated section or view within the QA Approval Label Module interface.", "Each label entry in the list displays key identifying information such as label name, label ID, submission date, and submitter name.", "The display list is sortable by relevant columns including submission date, label name, and submitter to facilitate efficient review prioritization.", "QA users can filter the list of labels in QA Review status by criteria such as date range, submitter, or label type.", "The system provides a search functionality allowing QA users to quickly locate specific labels in QA Review status by name or ID.", "When a QA user selects a label from the list, the system opens the full label details for comprehensive review.", "The label count or total number of labels currently in QA Review status is displayed prominently to inform workload visibility.", "The display automatically refreshes or updates when labels transition into or out of QA Review status without requiring manual page reload."]},
{cat:"QA Review",cls:"cat-workflow",persona:"QA Reviewer",want:"Review label designs and approve via e-signature to transition from QA Review to Approved",benefit:"Compliant labels proceed to production with audit trail of approval decisions",ac:["The system must display all labels currently in QA Review status in a dedicated review queue accessible to authorized QA reviewers.", "When a QA reviewer selects a label for review, the system must display the complete label design including all text, graphics, regulatory information, and metadata in a read-only preview format.", "The system must provide an option to compare the current label version with previous versions side-by-side to identify changes made during the design process.", "QA reviewers must be able to view the complete audit history of the label including who created it, all modifications made, and previous review attempts or rejections.", "The system must display a clearly visible Approve button that is only enabled when the reviewer has appropriate permissions and the label is in QA Review status.", "When the Approve button is clicked, the system must present an e-signature modal requiring the reviewer to enter their username and password to authenticate their approval decision.", "The e-signature modal must display the reviewer's full name, timestamp, and a statement confirming they are approving the label design for production use.", "The system must validate the e-signature credentials in real-time and display an error message if the username or password is incorrect, preventing approval without valid authentication.", "Upon successful e-signature authentication, the system must immediately change the label status from QA Review to Approved and timestamp the approval action.", "The system must record the approver's user ID, full name, e-signature timestamp, and any approval comments in the label's audit trail as a permanent immutable record."]},
{cat:"QA Review",cls:"cat-workflow",persona:"QA Reviewer",want:"Reject labels requiring changes and send back for rework with clear feedback",benefit:"Labeling quality standards are maintained and annotators can correct issues efficiently",ac:["The QA reviewer can select a 'Reject' action when reviewing a label that does not meet quality standards or requires corrections.", "When rejecting a label, the QA reviewer must provide a reason or comment explaining what needs to be changed before the rejection is submitted.", "The rejection reason field supports free-text input with a minimum character requirement to ensure meaningful feedback is provided.", "After a label is rejected, the system automatically changes the label status from 'In QA Review' to 'Rejected' or 'Rework Required'.", "The rejected label is removed from the QA reviewer's queue and returned to the original annotator's work queue for corrections.", "The annotator receives a notification when their label has been rejected, including the rejection reason and details about what needs to be fixed.", "The annotator can view the rejection comments directly on the label interface alongside the original labeling work for easy reference.", "When the annotator accesses a rejected label, all original label data and annotations are preserved and editable for rework.", "The label history or audit trail records the rejection event, including timestamp, QA reviewer name, and rejection reason for traceability.", "After making corrections, the annotator can resubmit the label, which changes the status from 'Rework Required' back to 'Pending QA Review'."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Study Protocol Manager",want:"Enter protocol details including name, description, and study description",benefit:"Establish foundational information for a new clinical study protocol",ac:["The system provides a form or interface with clearly labeled fields for Protocol Name, Protocol Description, and Study Description during the protocol setup workflow.", "The Protocol Name field accepts alphanumeric characters and common special characters with a reasonable character limit displayed to the user.", "The Protocol Description field allows multi-line text entry with sufficient character capacity to capture comprehensive protocol information.", "The Study Description field allows multi-line text entry with sufficient character capacity to document detailed study objectives and methodology.", "All three fields (Protocol Name, Protocol Description, Study Description) are marked as mandatory and the system prevents progression without completing them.", "The system displays clear validation error messages when attempting to save or proceed with empty mandatory fields, indicating which specific fields require completion.", "The Protocol Name field validates for uniqueness within the system to prevent duplicate protocol identifiers and displays an appropriate error message if a duplicate is detected.", "The system provides auto-save functionality to preserve entered data at regular intervals, preventing data loss during the entry process.", "Users can save the protocol details as a draft status, allowing them to return and complete the setup later without losing entered information.", "The system displays character count indicators for fields with length limitations, showing remaining available characters as the user types."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Study Protocol Manager",want:"Select and configure countries where the clinical study will be conducted",benefit:"Define geographical scope of the protocol and ensure compliance with regional requirements",ac:["The system must display a searchable list or dropdown of all available countries that can be selected for the study protocol.", "The user must be able to select multiple countries simultaneously for inclusion in the study protocol.", "The system must allow the user to remove previously selected countries from the protocol before finalizing the selection.", "Selected countries must be visually distinguished from unselected countries in the interface, such as through highlighting, checkmarks, or a separate selected items list.", "The system must validate that at least one country is selected before allowing the user to save or proceed to the next step in protocol setup.", "The system must display an error message if the user attempts to save the protocol without selecting any countries.", "The country selection must be saved automatically or through an explicit save action, persisting the data to the protocol record.", "The system must display a confirmation message when countries are successfully saved to the protocol.", "The user must be able to edit the country selection after initial save, allowing additions or removals at any time during protocol setup.", "The system must maintain an audit trail of country selection changes, recording which countries were added or removed and by which user and timestamp."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Study Protocol Manager",want:"Manage protocol lifecycle through Draft, Planned, Active, and Closed statuses",benefit:"Control protocol progression and ensure proper governance throughout the study lifecycle",ac:["The system must support four distinct protocol statuses: Draft, Planned, Active, and Closed, with clear definitions for each status state.", "When a new protocol is created, the system must automatically assign the status as Draft by default.", "Users with appropriate permissions must be able to transition a protocol from Draft status to Planned status when protocol design is complete.", "The system must allow transition from Planned status to Active status only when all required protocol setup prerequisites are met and validated.", "Users must be able to transition a protocol from Active status to Closed status when the study is completed or terminated.", "The system must prevent backward transitions from more advanced statuses to earlier statuses (e.g., Active cannot be changed back to Draft or Planned).", "The system must prevent deletion of protocols that are in Active or Closed status to maintain data integrity and audit trail.", "Users must be able to edit and modify protocol details when the protocol is in Draft status without restrictions.", "The system must restrict editing of critical protocol fields when the protocol is in Planned status, allowing only administrative corrections.", "When a protocol is in Active status, the system must make core protocol design elements read-only to prevent unauthorized changes during execution."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Study Administrator",want:"Configure and select from five protocol types (Open, Open Composite, Open Discrete, Blinded Kit-based, Blinded Patient-based)",benefit:"Accurately define the randomization and blinding strategy matching clinical trial requirements",ac:["The system must provide a protocol type selection field during protocol setup that includes exactly five options: Open, Open Composite, Open Discrete, Blinded Kit-based, and Blinded Patient-based.", "When Open protocol type is selected, the system must configure the protocol to allow all study personnel and participants to know the treatment assignments without any blinding restrictions.", "When Open Composite protocol type is selected, the system must allow multiple treatment arms to be grouped together while maintaining visibility of treatment assignments to all study personnel.", "When Open Discrete protocol type is selected, the system must configure the protocol to track each treatment arm separately without grouping, while maintaining open visibility of assignments.", "When Blinded Kit-based protocol type is selected, the system must enable kit-level randomization where treatment assignments are concealed and linked to specific kit identifiers rather than individual patients.", "When Blinded Patient-based protocol type is selected, the system must enable patient-level randomization where treatment assignments are concealed and directly linked to individual patient identifiers.", "The protocol type selection must be mandatory and the system must prevent protocol creation or progression without a valid protocol type selection.", "Once a protocol type is selected and saved, the system must display the selected protocol type prominently in the protocol summary and detail views.", "The system must enforce protocol type-specific validation rules, preventing incompatible configurations based on the selected protocol type during subsequent study setup steps.", "For blinded protocol types (Kit-based and Patient-based), the system must automatically enable blinding-related configuration options and disable options that would compromise the blind."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Protocol Designer",want:"Create treatment groups and associate treatments to those groups",benefit:"Organize and structure the treatment plan for the clinical trial protocol",ac:["The system shall allow users to create one or more treatment groups within a protocol, with each group having a unique name and description.", "The system shall enforce that treatment group names are unique within the same protocol to prevent confusion and duplication.", "The system shall allow users to edit the name and description of existing treatment groups after creation.", "The system shall allow users to delete treatment groups that have no treatments associated with them.", "The system shall prevent deletion of treatment groups that have one or more treatments already associated to them, displaying an appropriate error message.", "The system shall allow users to associate existing treatments from the protocol to one or more treatment groups through a selection interface.", "The system shall allow users to remove the association between a treatment and a treatment group without deleting the treatment itself.", "The system shall display a list of all treatment groups within a protocol showing the group name, description, and count of associated treatments.", "The system shall display all treatments associated with each treatment group in a clear and organized manner, allowing users to view which treatments belong to which groups.", "The system shall allow a single treatment to be associated with multiple treatment groups simultaneously to support complex protocol designs."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Protocol Designer",want:"Directly assign subjects to treatment arms in Open protocols without randomization",benefit:"Support non-randomized study designs where treatment assignment is predetermined or based on investigator choice",ac:["The system must allow direct assignment of subjects to treatment arms when the protocol type is defined as Open (non-randomized).", "When defining treatment structure for an Open protocol, the system must not require or enforce randomization rules, ratios, or stratification factors.", "The protocol designer must be able to configure whether direct assignment is performed by the investigator at the site level or centrally by the study coordinator.", "The system must provide a user interface option during treatment structure definition to enable or disable direct assignment functionality for Open protocols.", "When direct assignment is enabled, the system must allow investigators or coordinators to manually select a treatment arm from the available arms defined in the protocol.", "The system must validate that only one treatment arm is assigned per subject when using direct assignment in Open protocols.", "The system must prevent users from defining randomization schedules or randomization lists when direct assignment is selected for Open protocols.", "The system must display a clear indication in the protocol summary that the study uses direct assignment rather than randomization.", "When a subject is assigned to a treatment arm through direct assignment, the system must record the assignment date, time, user who performed the assignment, and the assigned treatment arm.", "The system must allow the protocol designer to specify whether treatment arm assignment can be changed after initial assignment and under what conditions changes are permitted."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Protocol Designer",want:"Define visits and generate a visit-based treatment matrix for blinded kit-based protocols",benefit:"Properly configure protocol structure and ensure accurate kit allocation across all study visits",ac:["The system allows the user to define the total number of visits for a blinded kit-based protocol during protocol configuration.", "The system generates a visit-based treatment matrix automatically once the number of visits is defined for the blinded kit-based protocol.", "The treatment matrix displays all defined visits as columns with appropriate visit identifiers and sequencing.", "The treatment matrix includes rows for each treatment arm defined in the blinded kit-based protocol configuration.", "The system allows the user to specify kit allocation requirements for each visit and treatment arm combination within the matrix.", "The matrix supports configuration of blinded kit dispensing rules, including which kits are dispensed at which visits for each treatment arm.", "The system validates that at least one visit is defined before allowing generation of the treatment matrix.", "The system prevents modification of the number of visits once the treatment matrix has been generated and saved, displaying an appropriate warning message.", "The treatment matrix interface provides clear visual indication of which cells represent active kit dispensing points versus non-dispensing visits.", "The system allows users to edit kit allocation details within the matrix cells after initial generation without regenerating the entire matrix."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Protocol Designer",want:"Define total patients and assign specific treatments to each patient in blinded patient-based protocols",benefit:"Create precise patient-level treatment allocation while maintaining study blinding requirements",ac:["The system shall allow the user to define the total number of patients to be enrolled in the blinded patient-based protocol model.", "The system shall provide an interface to assign treatments at the individual patient level rather than at cohort or group level for patient-based protocols.", "The system shall maintain blinding by not revealing treatment assignments to unauthorized users while allowing authorized users to configure patient-level treatment allocations.", "The system shall validate that the total number of patients defined matches the sum of patients assigned across all treatment arms before allowing protocol finalization.", "The system shall allow the user to specify treatment assignments for each patient number sequentially from patient 1 through the total number of patients defined.", "The system shall prevent assignment of the same patient number to multiple different treatments within the same protocol configuration.", "The system shall support modification of patient-level treatment assignments during the protocol planning phase before the protocol is locked or activated.", "The system shall display a clear visual representation showing which patients are assigned to which treatments in a tabular or grid format for easy review.", "The system shall validate that all defined patient positions have been assigned a treatment before allowing the protocol configuration to be saved as complete.", "The system shall support bulk assignment capabilities allowing users to assign multiple consecutive patients to the same treatment in a single operation."]},
{cat:"Study Protocols",cls:"cat-protocol",persona:"Protocol Manager",want:"Lock the protocol model after configuration is complete",benefit:"Prevent unauthorized or accidental changes and maintain data integrity throughout the study",ac:["The system provides a clearly visible 'Lock Protocol Model' action button or control available to authorized users after the protocol model configuration is completed.", "When the lock action is triggered, the system displays a confirmation dialog warning the user that locking will prevent further modifications and requesting explicit confirmation to proceed.", "Upon confirmation, the system immediately changes the protocol model status to 'Locked' and persists this state change in the database with a timestamp and user identifier.", "Once locked, all configuration fields, parameters, and settings within the blinded patient-based model become read-only and cannot be edited through the user interface.", "The system visually indicates the locked state through clear UI indicators such as disabled input fields, a lock icon, and a status badge displaying 'Locked' on the protocol model screen.", "Any attempt to modify locked protocol model fields results in the system displaying an error message stating 'This protocol model is locked and cannot be modified' without allowing the change.", "The system prevents API-level modifications to locked protocol models by validating the locked status and returning an appropriate error response when modification requests are received.", "Only users with specific administrative or unlock permissions can unlock a previously locked protocol model through a designated 'Unlock Protocol Model' action.", "When an authorized user unlocks the protocol model, the system logs the unlock action with timestamp, user identifier, and optional reason for audit trail purposes.", "After unlocking, the system restores full edit capabilities to the protocol model configuration and updates the status indicator to show 'Unlocked' or 'In Progress'."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistician / Clinical Data Manager",want:"Enter total number of kits for Open Composite protocols",benefit:"Accurately track kit inventory and ensure proper data generation for biostatistical analysis",ac:["The system must provide an input field specifically labeled for entering the total number of kits for Open Composite protocols within the Biostat Data Module interface.", "The total number of kits input field must accept only positive integer values and reject any non-numeric, negative, or decimal entries with appropriate validation messaging.", "When a user enters a valid total number of kits, the system must save the value immediately and associate it with the correct Open Composite protocol identifier.", "The system must display a clear error message if the user attempts to submit an empty or invalid value in the total number of kits field, preventing form submission until corrected.", "The entered total number of kits must be visible and editable by authorized users with appropriate permissions for the Open Composite protocol data entry.", "The system must validate that the total number of kits entered does not exceed any predefined maximum threshold configured for Open Composite protocols, if such limits exist.", "Upon successful entry and save of the total number of kits, the system must update any dependent calculations or reports that utilize this value for biostatistical data generation.", "The total number of kits field must support modification after initial entry, with the system maintaining an audit trail of all changes including user, timestamp, and previous values.", "The system must clearly indicate whether the total number of kits field is required or optional, and enforce this requirement during the data entry workflow.", "When generating Open Protocol Biostat Data, the system must incorporate the entered total number of kits value as part of the complete dataset output."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistician",want:"System generates discrete kit IDs for Open Discrete protocols",benefit:"Uniquely identify and track each kit used in discrete dosing studies for accurate biostatistical analysis",ac:["The system generates a unique kit ID for each discrete kit associated with an Open Discrete protocol when the protocol is created or kits are added.", "Kit IDs follow a standardized naming convention that is consistent across all Open Discrete protocols and distinguishable from other protocol types.", "Each generated kit ID is validated to ensure uniqueness within the protocol and across the entire biostat data module to prevent duplicate identifiers.", "The kit ID generation process automatically increments or uses a sequential pattern to maintain uniqueness when multiple kits are added to the same protocol.", "Generated kit IDs are immediately persisted to the database upon creation and are immutable once assigned to prevent data integrity issues.", "The system displays the generated kit ID in the protocol configuration interface immediately after creation so users can verify and reference it.", "Kit IDs are included in all biostat data exports and reports associated with Open Discrete protocols for traceability and audit purposes.", "The system prevents manual editing or deletion of generated kit IDs to maintain referential integrity across the biostat data module.", "When a kit is removed from an Open Discrete protocol, the associated kit ID is marked as inactive but retained in the system for historical tracking.", "The kit ID generation process handles concurrent kit creation requests without creating duplicate IDs through proper transaction management or locking mechanisms."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistician",want:"System automatically generates randomized kit data based on patient visits for blinded kit-based protocols",benefit:"Maintain study blinding while ensuring accurate kit assignment and tracking throughout the clinical trial",ac:["The system must generate randomized kit assignments automatically when a patient visit is recorded in a blinded kit-based protocol study.", "Each generated kit assignment must include a unique kit identifier that maintains blinding by not revealing treatment allocation to site staff or patients.", "The randomization algorithm must follow the protocol-specific randomization scheme including stratification factors, block sizes, and allocation ratios as configured for the study.", "Kit data generation must occur in real-time or near real-time upon visit completion to ensure kits are available for dispensing without delays.", "The system must validate that sufficient kit inventory exists at the site before generating kit assignments and display an error if inventory is insufficient.", "Generated kit data must include all required fields: kit number, randomization number, visit identifier, dispensing date, return date if applicable, and kit status.", "The system must maintain an audit trail of all kit assignments including timestamp, user who triggered the visit, and randomization parameters used.", "Kit assignments must be irreversible once generated to maintain randomization integrity, with any corrections requiring a formal unblinding or protocol deviation process.", "The system must support multiple kit types per visit when protocols require dispensing of different medication kits or supplies during a single visit.", "Generated kit data must automatically update the kit inventory status from available to assigned and track the chain of custody from randomization through dispensing."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistician",want:"Generate randomized patient data for blinded patient-based protocols",benefit:"Conduct statistical analyses while maintaining patient confidentiality and study blinding integrity",ac:["The system shall generate randomized patient identifiers that cannot be traced back to actual patient identities for blinded protocols.", "The system shall maintain consistent randomization mapping throughout the protocol lifecycle to ensure the same patient receives the same blinded identifier.", "The system shall support generation of patient data for multiple treatment arms while preserving blinding between groups.", "The system shall randomize patient demographic data including age, gender, and baseline characteristics according to protocol specifications.", "The system shall generate randomized clinical outcome data points while maintaining statistical validity and distribution properties.", "The system shall allow configuration of randomization parameters including block size, stratification factors, and allocation ratios for patient-based protocols.", "The system shall validate that generated randomized data maintains the required statistical properties and distribution characteristics of the source data.", "The system shall prevent any personally identifiable information from appearing in the generated blinded patient dataset.", "The system shall generate an audit trail documenting when randomized patient data was created, by whom, and what parameters were used.", "The system shall support re-generation of randomized patient data using the same seed value to reproduce identical datasets when needed."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistics Data Manager",want:"Import external biostat data from CSV/Excel files and generate system records",benefit:"Efficiently integrate third-party biostatistical datasets without manual data entry",ac:["The system must support file upload functionality that accepts both CSV and Excel file formats (.csv, .xls, .xlsx) for biostat data import.", "The system must validate the uploaded file format before processing and display an error message if the file format is not supported.", "The system must provide a file size limit for uploads and reject files exceeding the maximum allowed size with a clear error message.", "The system must parse and read the column headers from the uploaded file to map them to corresponding system fields.", "The system must allow users to preview the first 10-20 rows of the uploaded file data before confirming the import to verify data accuracy.", "The system must provide a field mapping interface where users can map source file columns to target system fields for biostat data.", "The system must support automatic field mapping when column headers in the uploaded file match existing system field names exactly.", "The system must allow users to manually adjust field mappings when automatic mapping is incomplete or incorrect.", "The system must validate required fields during import and prevent import completion if mandatory biostat data fields are missing.", "The system must validate data types for each mapped field and flag rows with data type mismatches for user review."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistician / Data Manager",want:"Complete biostat data entries and apply electronic signature to finalize submission",benefit:"Formally approve and lock the data for regulatory compliance and downstream analysis",ac:["The system shall provide a clear action button or mechanism to mark biostat data as complete once all required fields have been filled and validated.", "Upon initiating the completion action, the system shall display an e-signature dialog requiring the user to enter their credentials (username and password) to authenticate their identity.", "The e-signature dialog shall include a statement of intent that clearly describes what the user is signing and approving, including the specific biostat data record or dataset being finalized.", "The system shall validate the entered e-signature credentials against the user's stored authentication information and reject invalid or incorrect credentials with an appropriate error message.", "Upon successful e-signature authentication, the system shall timestamp the completion action with the exact date and time in a non-editable format.", "The system shall permanently associate the authenticated user's identity (full name, user ID) with the completed biostat data record as the approver or signer.", "Once the biostat data is completed with e-signature, the system shall change the record status to a finalized or locked state that prevents further editing of the data fields.", "The system shall display a visual indicator (such as a status badge, icon, or color coding) on the biostat data record showing it has been completed and signed.", "The system shall maintain a complete audit trail entry recording the e-signature event, including who signed, when they signed, what was signed, and the IP address or system location.", "If the user cancels the e-signature dialog without completing authentication, the system shall not change the biostat data status and shall keep the record in its current editable state."]},
{cat:"Biostatistics",cls:"cat-biostat",persona:"Biostatistician / Authorized Data Reviewer",want:"Approve biostat data using electronic signature",benefit:"Approved data becomes immutable and maintains regulatory compliance with complete audit trail",ac:["The system must provide an 'Approve' action button or option that is only visible and accessible to users with biostat data approval permissions.", "When the user initiates the approval action, the system must prompt for an electronic signature including username and password re-authentication to verify identity.", "The e-signature capture dialog must include fields for username, password, and an optional comment or reason for approval that can be recorded in the audit trail.", "The system must validate the user's credentials in real-time and display an error message if the username or password is incorrect, preventing approval from proceeding.", "Upon successful e-signature authentication, the system must immediately change the biostat data record status to 'Approved' and timestamp the approval action with date, time, and user identity.", "Once data is approved with e-signature, all data fields in the biostat record must become immutable and read-only, preventing any further edits or modifications by any user including administrators.", "The system must visually indicate approved status through a clear status badge, label, or indicator displayed prominently on the biostat data record view.", "The approval action must be recorded in a comprehensive audit trail capturing the approver's username, full name, date and time of approval, e-signature details, and any comments provided.", "If the user cancels the e-signature dialog or closes it without completing authentication, the approval action must be aborted and the data must remain in its previous unapproved state.", "The system must prevent approval of biostat data that is incomplete, has validation errors, or does not meet all required data quality checks before allowing e-signature capture."]},
{cat:"Print Requests",cls:"cat-print",persona:"User (Print Request Creator)",want:"Select a protocol and choose an approved label design associated with that protocol",benefit:"Ensure correct labeling format is used for the print job and comply with protocol-specific requirements",ac:["The system displays a dropdown or selection field for the user to choose from available protocols when creating a new print request.", "Only protocols that the user has permission to access are displayed in the protocol selection list.", "When a protocol is selected, the system automatically filters and displays only the approved label designs that are associated with the selected protocol.", "If no protocol is selected, the label design selection field remains disabled or displays a message indicating that a protocol must be selected first.", "The label design selection field displays all approved label designs linked to the chosen protocol, showing relevant identifying information such as design name, version, or description.", "The system prevents the user from selecting a label design that is not approved or not associated with the currently selected protocol.", "If the selected protocol has no approved label designs associated with it, the system displays an appropriate message informing the user that no designs are available.", "The user can change the selected protocol, and when changed, the label design field automatically updates to show only designs associated with the newly selected protocol, clearing any previously selected design.", "Both protocol and label design selections are mandatory fields, and the system prevents the user from proceeding with the print request creation until both are selected.", "The selected protocol and label design are saved as part of the print request data and can be viewed in the print request details after creation."]},
{cat:"Print Requests",cls:"cat-print",persona:"User (Print Request Creator)",want:"System automatically resolves data and runtime placeholders with actual values",benefit:"Print document contains accurate and complete information without manual intervention",ac:["The system identifies all data placeholders in the print template and replaces them with corresponding actual values from the data source before generating the print request.", "The system identifies all runtime placeholders in the print template and replaces them with corresponding actual values generated at the time of print request creation.", "Data placeholders are resolved using values from the associated record or entity that the print request is being created for.", "Runtime placeholders such as current date, current time, current user, and system-generated values are resolved with actual runtime values at the moment of print request creation.", "If a data placeholder references a field that has no value or is null, the system replaces it with an empty string or a predefined default value based on configuration.", "If a data placeholder references a field that does not exist in the data source, the system logs an error and either displays the placeholder as-is or shows an error indicator in the print preview.", "The system supports nested or complex placeholders that may reference related entities or lookup values, resolving them through appropriate data relationships.", "All placeholder resolution occurs before the print document is rendered or displayed in preview mode, ensuring users see the final output with resolved values.", "The system maintains a mapping or configuration that defines which data fields correspond to which placeholders, allowing for flexible template customization.", "Runtime placeholders for date and time are resolved using the user's timezone and locale settings to ensure appropriate formatting."]},
{cat:"Print Requests",cls:"cat-print",persona:"Print Request Administrator",want:"Configure subset printing options for partial kits and partial patients",benefit:"Generate print requests for specific subsets of materials rather than complete sets",ac:["The system must provide a configuration option to enable or disable subset printing functionality for print requests within the print request module.", "When subset printing is enabled, users must be able to select specific kit components to print rather than being required to print the entire kit.", "The system must support partial patient printing, allowing users to select a subset of patients from a larger patient list for printing operations.", "The subset printing configuration must include validation to ensure at least one kit component or patient is selected before allowing print request submission.", "When partial kit printing is selected, the system must display a clear list of all available kit components with checkboxes or similar selection mechanisms for user choice.", "The system must maintain a record of which specific kit components were included in each subset print request for audit and tracking purposes.", "When partial patient printing is selected, the system must provide filtering or search capabilities to help users identify and select the desired subset of patients.", "The subset printing configuration must support saving user-defined subset templates for frequently used partial kit or patient combinations to improve workflow efficiency.", "The print request preview must clearly indicate when a subset print is configured, displaying which components or patients are included versus excluded from the full set.", "The system must prevent submission of empty subset print requests where no kit components or no patients have been selected, displaying an appropriate validation error message."]},
{cat:"Print Requests",cls:"cat-print",persona:"User (Print Request Creator)",want:"Preview print output before finalizing the request",benefit:"Verify content, layout, and formatting are correct before committing to the print job",ac:["The system displays a preview button or option that is clearly visible and accessible after the user has configured their subset printing selections but before finalizing the print request.", "When the user clicks the preview option, the system generates and displays a visual representation of how the printed output will appear based on the current subset printing configuration.", "The preview displays all pages that will be included in the print job according to the configured subset parameters such as page ranges, selected sections, or filtered content.", "The preview accurately reflects all formatting options selected by the user including orientation (portrait or landscape), paper size, margins, headers, footers, and any other layout settings.", "The preview shows the actual content that will be printed with correct fonts, font sizes, colors, images, tables, and other visual elements as they will appear on paper.", "The user can navigate through multiple pages in the preview using next/previous buttons, page numbers, or a thumbnail view if the print job contains more than one page.", "The preview interface includes a zoom functionality allowing users to zoom in and out to inspect details of the print output at different magnification levels.", "The system displays the total page count prominently in the preview interface so users can verify the number of pages that will be printed matches their expectations.", "The preview window or panel includes clear action buttons such as 'Back to Edit', 'Cancel', and 'Confirm Print' to allow users to proceed with their desired workflow.", "If the user selects 'Back to Edit' or equivalent option from the preview, the system returns them to the subset printing configuration screen with all their previous selections preserved."]},

const STORAGE_KEY="req-tracker-v2";
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
let filter="all";
let expanded={};
let catFilterValue="all";

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function toggle(i){state[i]=state[i]===true?false:true;save();render()}
function toggleExpand(i){expanded[i]=expanded[i]===true?false:true;render()}
function resetAll(){if(!confirm("Reset all statuses to Pending?"))return;state={};save();render()}
function markAll(){if(!confirm("Mark all requirements as Completed?"))return;data.forEach((_,i)=>{state[i]=true});save();render()}

function getFiltered(){
const q=document.getElementById("search").value.toLowerCase();
return data.map((d,i)=>({...d,i})).filter(d=>{
const searchable=`${d.persona} ${d.want} ${d.benefit} ${d.cat}`.toLowerCase();
const matchSearch=searchable.includes(q);
const matchFilter=filter==="all"||(filter==="completed"&&state[d.i]===true)||(filter==="pending"&&state[d.i]!==true);
const matchCat=catFilterValue==="all"||d.cat===catFilterValue;
return matchSearch&&matchFilter&&matchCat;
});
}

function render(){
const items=getFiltered();
const done=data.filter((_,i)=>state[i]===true).length;
const total=data.length;
const pct=total?Math.round(done/total*100):0;
document.getElementById("stats").innerHTML=`
<div class="stat-card stat-total"><div class="num">${total}</div><div class="label">Total Requirements</div></div>
<div class="stat-card stat-done"><div class="num">${done}</div><div class="label">Completed</div></div>
<div class="stat-card stat-pending"><div class="num">${total-done}</div><div class="label">Pending</div></div>
<div class="stat-card stat-pct"><div class="num">${pct}%</div><div class="label">Progress</div></div>`;
document.getElementById("progressFill").style.width=pct+"%";
const tbody=document.getElementById("tbody");
if(!items.length){tbody.innerHTML=`<tr><td colspan="4" class="empty-msg">No requirements match your filters</td></tr>`;return}
tbody.innerHTML=items.map(d=>{
const done=state[d.i]===true;
const isOpen=expanded[d.i]===true;
const acHtml=(d.ac&&d.ac.length)?d.ac.map((a,i)=>`<div class="ac-card"><div class="ac-num">${i+1}</div><div class="ac-text">${a.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>`).join(""):"";
return `<tr class="data-row" onclick="toggleExpand(${d.i})">
<td class="id-col">${d.i+1}</td>
<td class="category-col"><span class="cat-badge ${d.cls}">${d.cat}</span></td>
<td class="desc-col"><div class="user-story"><span class="ac-toggle ${isOpen?"expanded":""}">&#9654;</span>
<span class="persona"><span>As a</span> ${d.persona},</span>
<span class="want"><strong>I want</strong> ${d.want},</span>
<span class="benefit"><strong>so that</strong> ${d.benefit}.</span>
</div></td>
<td class="status-col"><button class="status-btn ${done?"done":"not-done"}" onclick="event.stopPropagation();toggle(${d.i})"><span class="icon">${done?"&#10003;":"&#10007;"}</span>${done?"Done":"Pending"}</button></td>
</tr>
<tr class="ac-panel ${isOpen?"open":""}"><td colspan="4"><div class="ac-container"><div class="ac-title">Acceptance Criteria</div><div class="ac-grid">${acHtml}</div></div></td></tr>`;
}).join("");
}

const cats=[...new Set(data.map(d=>d.cat))];
const catSel=document.getElementById("catFilter");
cats.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;catSel.appendChild(o)});

document.getElementById("search").addEventListener("input",render);
catSel.addEventListener("change",e=>{catFilterValue=e.target.value;render()});
document.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{
document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
b.classList.add("active");filter=b.dataset.filter;render();
}));
render();
</script>
</body>
</html>
