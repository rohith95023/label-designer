spring:
  application:
    name: pharma-label-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Sync entity changes without destructive drops
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:900000} # 15 minutes default
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days default
