<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pharma Label Design</title>
  
  <script>
    // Critical: Initialize theme and background immediately
    (function () {
      const theme = localStorage.getItem('pharma-theme') || 'light';
      document.documentElement.classList.toggle('dark', theme === 'dark');
      document.documentElement.style.backgroundColor = theme === 'dark' ? '#0d1117' : '#ffffff';
    })();
  </script>

  <style>
    /* Absolute Zero-Latency Loader Styles */
    #static-loader-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100000; transition: opacity 0.4s ease, visibility 0.4s ease;
      background-color: inherit;
    }
    .loader-icon-box {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; box-shadow: 0 12px 32px rgba(37,99,235,0.2);
      animation: pharma-float 2.5s ease-in-out infinite;
    }
    .loader-title {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px;
      color: #1a1d2e;
    }
    .dark .loader-title { color: #e4eaf5; }
    .loader-line-container {
      width: 120px; height: 3px; background: rgba(37,99,235,0.1); border-radius: 8px; overflow: hidden;
    }
    .loader-line-bar {
      width: 50%; height: 100%; border-radius: 8px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      animation: pharma-progress 1.6s infinite ease-in-out;
    }
    @keyframes pharma-float { 
      0%, 100% { transform: translateY(0); } 
      50% { transform: translateY(-8px); } 
    }
    @keyframes pharma-progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    /* Hide loader when app is ready */
    .app-ready #static-loader-overlay {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
  </style>

  <!-- Non-blocking Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 antialiased">
  
  <!-- Zero-latency static loader (OUTSIDE root) -->
  <div id="static-loader-overlay">
    <div class="loader-icon-box">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/>
        <path d="M5 14h14"/><path d="M5 10h14"/>
        <path d="M19 18H5"/>
      </svg>
    </div>
    <div class="loader-title">Clinical Label Design</div>
    <div class="loader-line-container">
      <div class="loader-line-bar"></div>
    </div>
  </div>

  <div id="root"></div>

  <!-- Re-inject massive font library after hydration -->
  <script>
    window.addEventListener('load', () => {
      const fonts = 'https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&family=Roboto:wght@400;700&family=Poppins:wght@400;700&family=Outfit:wght@400;700&family=Lato:wght@400;700&family=Open+Sans:wght@400;600;700&family=Nunito:wght@400;700&family=Raleway:wght@400;700&family=Montserrat:wght@400;700&family=Source+Sans+3:wght@400;600;700&family=DM+Sans:wght@400;700&family=Noto+Sans:wght@400;600;700&family=Ubuntu:wght@400;700&family=Josefin+Sans:wght@400;600;700&family=Barlow:wght@400;600;700&family=Mulish:wght@400;600;700&family=Quicksand:wght@400;600;700&family=Exo+2:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@400;700&family=Lora:wght@400;700&family=EB+Garamond:wght@400;600;700&family=PT+Serif:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Courier+Prime:wght@400;700&family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;600;700&family=Fira+Code:wght@400;600;700&display=swap';
      const link = document.createElement('link');
      link.href = fonts;
      link.rel = 'stylesheet';
      document.head.appendChild(link);
    });
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
