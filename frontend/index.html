  <title>Pharma Label Design</title>
  <!-- Add this to prevent FOUC (Flash of Unstyled Content) on reload -->
  <script>
    try {
      if (localStorage.getItem('pharma-theme') === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    } catch (e) { }
  </script>
